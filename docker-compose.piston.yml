# docker-compose.piston.yml
# ─────────────────────────
# Runs the Piston sandboxed code execution API.
# Piston isolates and executes student code safely inside containers.
#
# Usage (from project root):
#   docker-compose -f docker-compose.piston.yml up -d
#
# Then install the language runtimes (one-time setup):
#   docker-compose -f docker-compose.piston.yml exec piston \
#     python3 /piston/api/src/install_packages.sh
#
# Or install languages individually — see Step 3 in README.
#
# API will be available at: http://localhost:2000
# Test it:  curl http://localhost:2000/api/v2/runtimes

services:
  piston:
    image: ghcr.io/engineer-man/piston
    container_name: piston
    restart: unless-stopped
    ports:
      - "2000:2000"        # Piston REST API
    privileged: true        # required — Piston uses isolate (Linux sandbox) internally
    tmpfs:
      - /piston/jobs       # job scratch space — never persisted to disk
      - /piston/isolate    # isolate working directory — must be writable
    environment:
      - PISTON_LOG_LEVEL=DEBUG
      # Allow up to 15 s per execution so problems that legitimately need more
      # time (e.g. N-Queens n=8 → 10 s, LIS → 8 s) are not rejected.
      # The Django layer enforces per-problem limits within this ceiling.
      - PISTON_RUN_TIMEOUT=15000
      - PISTON_COMPILE_TIMEOUT=15000
    volumes:
      - piston_packages:/piston/packages   # installed language runtimes persist here

volumes:
  piston_packages:
    driver: local