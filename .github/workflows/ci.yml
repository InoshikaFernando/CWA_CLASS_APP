      - name: Install dependencies
        run: pip install -r cwa_classroom/requirements-test.txt

      - name: Run billing tests
        working-directory: cwa_classroom
        run: pytest billing/tests.py billing/tests_admin.py billing/tests_gaps.py billing/tests_parent_invoice_payment.py billing/tests_stripe.py billing/tests_views_coverage.py billing/tests_webhook_handlers.py -n auto --dist=loadscope -v --tb=short

  homework-tests:
    name: Homework Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cwa_classroom/requirements-test.txt

      - name: Install dependencies
        run: pip install -r cwa_classroom/requirements-test.txt

      - name: Run homework tests
        working-directory: cwa_classroom
        run: pytest homework/tests.py -n auto --dist=loadscope -v --tb=short

  brainbuzz-tests:
    name: BrainBuzz Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cwa_classroom/requirements-test.txt

      - name: Install dependencies
        run: pip install -r cwa_classroom/requirements-test.txt

      - name: Run brainbuzz tests
        working-directory: cwa_classroom
        run: pytest brainbuzz/tests/ --ignore=brainbuzz/tests/test_student_playwright_mobile.py -n auto --dist=loadscope -v --tb=short

  worksheets-tests:
    name: Worksheets Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cwa_classroom/requirements-test.txt

      - name: Install dependencies
        run: pip install -r cwa_classroom/requirements-test.txt

      - name: Run worksheets tests
        working-directory: cwa_classroom
        run: pytest worksheets/tests/ -n auto --dist=loadscope -v --tb=short

  taskqueue-tests:
    name: Taskqueue Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cwa_classroom/requirements-test.txt

      - name: Install dependencies
        run: pip install -r cwa_classroom/requirements-test.txt

      - name: Run taskqueue tests
        working-directory: cwa_classroom
        run: pytest taskqueue/tests/ -n auto --dist=loadscope -v --tb=short

  feedback-tests:
    name: Feedback Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cwa_classroom/requirements-test.txt

      - name: Install dependencies
        run: pip install -r cwa_classroom/requirements-test.txt

      - name: Run feedback tests
        working-directory: cwa_classroom
        run: pytest feedback/tests/ -n auto --dist=loadscope -v --tb=short

  sprints-tests:
    name: Sprints Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cwa_classroom/requirements-test.txt

      - name: Install dependencies
        run: pip install -r cwa_classroom/requirements-test.txt

      - name: Run sprints tests
        working-directory: cwa_classroom
        run: pytest sprints/tests/ -n auto --dist=loadscope -v --tb=short

  whatsapp-tests:
    name: WhatsApp Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cwa_classroom/requirements-test.txt

      - name: Install dependencies
        run: pip install -r cwa_classroom/requirements-test.txt

      - name: Run whatsapp tests
        working-directory: cwa_classroom
        run: pytest whatsapp/tests/ -n auto --dist=loadscope -v --tb=short

  ui-tests:
    name: UI Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cwa_classroom/requirements-test.txt

      - name: Install dependencies
        run: pip install -r cwa_classroom/requirements-test.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('cwa_classroom/requirements-test.txt') }}

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run UI tests
        working-directory: cwa_classroom
        # --reruns retries ONLY the known SQLite "database is locked" flake from
        # parallel Playwright workers (see cwa_classroom/conftest.py); scoped via
        # --only-rerun so genuine assertion failures still fail on the first run.
        run: pytest ui_tests/ brainbuzz/tests/test_student_playwright_mobile.py -n auto -v --tb=short --reruns 2 --only-rerun "database is locked"
