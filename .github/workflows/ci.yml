name: CI — Tests

on:
  push:
    branches: [main, test, dev]
  pull_request:
    branches: [main, test, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DB_ENGINE: sqlite

jobs:
  migration-check:
    name: Migration Health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cwa_classroom/requirements-test.txt

      - name: Install dependencies
        run: pip install -r cwa_classroom/requirements-test.txt

      - name: Check for migration conflicts and missing migrations
        working-directory: cwa_classroom
        run: pytest tests_migrations.py -v --tb=short

  classroom-tests:
    name: Classroom Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cwa_classroom/requirements-test.txt

      - name: Install dependencies
        run: pip install -r cwa_classroom/requirements-test.txt

      - name: Run classroom tests
        working-directory: cwa_classroom
        run: pytest classroom/tests/ -n auto --dist=loadscope -v --tb=short

  maths-tests:
    name: Maths Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cwa_classroom/requirements-test.txt

      - name: Install dependencies
        run: pip install -r cwa_classroom/requirements-test.txt

      - name: Run maths tests
        working-directory: cwa_classroom
        run: pytest maths/tests/ -n auto --dist=loadscope -v --tb=short

  puzzles-tests:
    name: Number Puzzles Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cwa_classroom/requirements-test.txt

      - name: Install dependencies
        run: pip install -r cwa_classroom/requirements-test.txt

      - name: Run number puzzles tests
        working-directory: cwa_classroom
        run: pytest number_puzzles/tests/ -n auto --dist=loadscope -v --tb=short

  coding-tests:
    name: Coding Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cwa_classroom/requirements-test.txt

      - name: Install dependencies
        run: pip install -r cwa_classroom/requirements-test.txt

      - name: Run coding tests
        working-directory: cwa_classroom
        run: pytest coding/tests/ -n auto --dist=loadscope -v --tb=short

  languages-tests:
    name: Languages Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
