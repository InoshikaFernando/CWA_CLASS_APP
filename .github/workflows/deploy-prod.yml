name: Deploy to Production

# Weekly production release — every Sunday ~03:00 NZ time. This job:
#   1. Promotes the week's work by merging `test` → `main` and pushing main.
#   2. Deploys the freshly-merged `main` to prod over SSH (scripts/deploy.sh).
#   3. Runs the public smoke test and alerts to DEPLOY_ALERT_WEBHOOK on failure.
#
# There is NO human review gate before prod — the deep health gate, the public
# smoke test, and the Sunday-morning timing (low traffic, time to react before
# Monday) are the safety net. If the test→main merge hits a conflict the job
# fails and nothing deploys.
#
# NOTE: `schedule` only fires from the repository's DEFAULT branch (main), so
# this file must be present on main for the weekly release to run. Trigger an
# off-schedule release (e.g. hotfix) via "Run workflow".
#
# Branch protection: the promote step pushes to `main` with GITHUB_TOKEN. If
# `main` is a protected branch that forbids direct pushes, set a `RELEASE_TOKEN`
# secret (a PAT / fine-grained token allowed to bypass the rule) — it is used in
# preference to GITHUB_TOKEN when present.
#
# Cron is UTC, no DST awareness. `0 15 * * 6` = Saturday 15:00 UTC =
# Sunday 03:00 NZST (winter) / 04:00 NZDT (summer); use `0 14 * * 6` for 03:00
# in summer.
#
# Required repository secrets:
#   DEPLOY_HOST          — prod server IP / hostname
#   DEPLOY_SSH_KEY       — private key authorised for the deploy user on prod
#   DEPLOY_USER          — (optional) SSH user, default: cwa
#   DEPLOY_PATH          — (optional) repo path,  default: /home/cwa/CWA_CLASS_APP
#   SMOKE_URL            — (optional) URL to smoke, default: https://www.wizardslearninghub.co.nz
#   RELEASE_TOKEN        — (optional) token to push main if branch-protected
#   DEPLOY_ALERT_WEBHOOK — (optional) Slack/Discord incoming webhook for failure alerts
#
# Until DEPLOY_HOST is set the whole job no-ops (and `main` is left untouched).

on:
  schedule:
    - cron: "0 15 * * 6"     # Sat 15:00 UTC → Sun 03:00 NZST
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false      # never interrupt an in-flight release

jobs:
  release:
    name: Promote test → main, then deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      configured: ${{ steps.gate.outputs.configured }}
    steps:
      - name: Check deploy secrets
        id: gate
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DEPLOY_HOST not set — skipping promotion + prod deploy (main left untouched)."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout main
        if: steps.gate.outputs.configured == 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      - name: Promote test → main
        if: steps.gate.outputs.configured == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin test
          # Merge the week's work. A conflict aborts the release (fails the job)
          # rather than guessing a resolution and shipping it to prod.
          git merge --no-ff origin/test -m "Weekly release: merge test → main"
          git push origin HEAD:main

      - name: Deploy to production
        if: steps.gate.outputs.configured == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            "${DEPLOY_USER:-cwa}@${DEPLOY_HOST}" \
            "cd ${DEPLOY_PATH:-/home/cwa/CWA_CLASS_APP} && DEPLOY_BRANCH=main bash scripts/deploy.sh"
          # deploy.sh resets the server to origin/main (now including the merge),
          # migrates, collects static, restarts gunicorn, and runs the deep
          # /api/health/?deep=1 gate — exiting non-zero if the build is unhealthy.

  smoke:
    name: Post-deploy smoke (public)
    needs: release
    if: needs.release.outputs.configured == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright + Chromium
        run: |
          pip install playwright==1.49.1
          playwright install --with-deps chromium

      - name: Public smoke test
        env:
          SMOKE_URL: ${{ secrets.SMOKE_URL }}
        working-directory: cwa_classroom
        run: |
          URL="${SMOKE_URL:-https://www.wizardslearninghub.co.nz}"
          echo "Smoke-testing ${URL} (public/liveness only)"
          python smoke_test.py "$URL" --public-only

  notify-failure:
    name: Alert on failed release
    needs: [release, smoke]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Post failure to webhook
        env:
          WEBHOOK_URL: ${{ secrets.DEPLOY_ALERT_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::notice::DEPLOY_ALERT_WEBHOOK not set — skipping chat alert (GitHub still emails the run owner)."
            exit 0
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          MSG="🚨 CWA PROD release FAILED (test→main merge or deploy) — ${RUN_URL}"
          printf '{"text": %s, "content": %s}' "$(jq -Rn --arg m "$MSG" '$m')" "$(jq -Rn --arg m "$MSG" '$m')" \
            | curl -sS -X POST -H 'Content-Type: application/json' -d @- "$WEBHOOK_URL"
