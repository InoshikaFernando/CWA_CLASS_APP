name: Deploy to Production

# Ships main to the DigitalOcean Droplet by running scripts/deploy.sh over SSH,
# then gates on a public (no-auth) smoke test of the deployed site.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST     — Droplet IP / hostname
#   DEPLOY_SSH_KEY  — private key authorised for the deploy user
#   DEPLOY_USER     — (optional) SSH user, default: cwa
#   DEPLOY_PATH     — (optional) repo path,  default: /home/cwa/CWA_CLASS_APP
#   SMOKE_URL       — (optional) URL to smoke, default: https://wizardslearninghub.co.nz
#   DEPLOY_ALERT_WEBHOOK — (optional) Slack or Discord incoming-webhook URL;
#                          a failed deploy/smoke posts an alert to it.
#
# Until DEPLOY_HOST is set the deploy step no-ops (keeps main green); the smoke
# job still runs as a liveness check.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false      # never interrupt an in-flight deploy

jobs:
  deploy:
    name: Deploy over SSH
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.gate.outputs.configured }}
    steps:
      - uses: actions/checkout@v4

      - name: Check deploy secrets
        id: gate
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DEPLOY_HOST not set — skipping deploy. Add DEPLOY_HOST / DEPLOY_SSH_KEY (and optionally DEPLOY_USER, DEPLOY_PATH) to enable automated deploys."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy
        if: steps.gate.outputs.configured == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            "${DEPLOY_USER:-cwa}@${DEPLOY_HOST}" \
            "cd ${DEPLOY_PATH:-/home/cwa/CWA_CLASS_APP} && bash scripts/deploy.sh"
          # scripts/deploy.sh runs the deep /api/health/?deep=1 gate on the
          # Droplet and exits non-zero if the new build is unhealthy.

  smoke:
    name: Post-deploy smoke (public)
    needs: deploy
    # Only smoke when a deploy actually ran — until the secrets are set there's
    # nothing newly deployed to test, and probing prod on every push would
    # false-red if it's unreachable from the runner.
    if: needs.deploy.outputs.configured == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright + Chromium
        run: |
          pip install playwright==1.49.1
          playwright install --with-deps chromium

      - name: Public smoke test
        env:
          SMOKE_URL: ${{ secrets.SMOKE_URL }}
        working-directory: cwa_classroom
        run: |
          URL="${SMOKE_URL:-https://wizardslearninghub.co.nz}"
          echo "Smoke-testing ${URL} (public/liveness only)"
          python smoke_test.py "$URL" --public-only

  notify-failure:
    name: Alert on failed deploy
    needs: [deploy, smoke]
    # Fires only when the deploy or the post-deploy smoke actually failed.
    # If the deploy was skipped (secrets not set) nothing failed, so no alert.
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Post failure to webhook
        env:
          WEBHOOK_URL: ${{ secrets.DEPLOY_ALERT_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::notice::DEPLOY_ALERT_WEBHOOK not set — skipping chat alert (GitHub still emails the run owner)."
            exit 0
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          MSG="🚨 CWA deploy FAILED on ${GITHUB_REF_NAME} (${GITHUB_SHA:0:7}) — ${RUN_URL}"
          # Slack incoming webhooks read "text"; Discord reads "content".
          # Sending both keys makes one payload work for either provider.
          printf '{"text": %s, "content": %s}' "$(jq -Rn --arg m "$MSG" '$m')" "$(jq -Rn --arg m "$MSG" '$m')" \
            | curl -sS -X POST -H 'Content-Type: application/json' -d @- "$WEBHOOK_URL"

