name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  review:
    if: >
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Review this Django/Python PR. Focus on:
            - Code quality and Django best practices
            - Security issues (SQL injection, XSS, CSRF, auth bypass)
            - Test coverage — flag untested logic
            - Performance (N+1 queries, missing indexes, unnecessary DB hits)
            - Breaking changes that could affect other developers
            Be concise. Only comment where there is a real issue or improvement.
