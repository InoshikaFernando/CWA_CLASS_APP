{% extends "base.html" %}

{% block title %}Create Progress Criteria{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">

  <div class="mb-8">
    <a href="{% url 'progress_criteria_list' %}" class="text-accent hover:text-accent-dark text-sm font-medium transition">&larr; Back to Criteria</a>
    <h1 class="text-2xl font-display font-bold text-gray-900 mt-2">Create Progress Criteria</h1>
    {% if school %}<p class="text-gray-500 mt-1">{{ school.name }}</p>{% endif %}
  </div>

  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-8">
    <form method="post">
      {% csrf_token %}

      <div class="space-y-6">
        <div>
          <label for="name" class="block text-sm font-semibold text-gray-700 mb-1.5">Criteria Name *</label>
          <input type="text" name="name" id="name" required
                 value="{{ form_data.name|default:'' }}"
                 class="w-full px-4 py-2.5 border border-slate-300 rounded-xl text-gray-900 focus:ring-2 focus:ring-accent focus:border-accent transition"
                 placeholder="e.g. Can count to 100 by 2s">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label for="subject_id" class="block text-sm font-semibold text-gray-700 mb-1.5">Subject *</label>
            <select name="subject_id" id="subject_id" required
                    class="w-full px-4 py-2.5 border border-slate-300 rounded-xl text-gray-900 focus:ring-2 focus:ring-accent focus:border-accent transition">
              <option value="">Select subject...</option>
              {% for s in subjects %}
                <option value="{{ s.id }}">{{ s.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label for="level_id" class="block text-sm font-semibold text-gray-700 mb-1.5">Level *</label>
            <select name="level_id" id="level_id" required
                    class="w-full px-4 py-2.5 border border-slate-300 rounded-xl text-gray-900 focus:ring-2 focus:ring-accent focus:border-accent transition">
              <option value="">Select level...</option>
              {% for l in levels %}
                <option value="{{ l.id }}">{{ l.display_name }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div>
          <label for="description" class="block text-sm font-semibold text-gray-700 mb-1.5">Description</label>
          <textarea name="description" id="description" rows="3"
                    class="w-full px-4 py-2.5 border border-slate-300 rounded-xl text-gray-900 focus:ring-2 focus:ring-accent focus:border-accent transition"
                    placeholder="Optional details about this criteria">{{ form_data.description|default:'' }}</textarea>
        </div>

        <div>
          <label for="order" class="block text-sm font-semibold text-gray-700 mb-1.5">Display Order</label>
          <input type="number" name="order" id="order" min="0"
                 value="{{ form_data.order|default:'0' }}"
                 class="w-32 px-4 py-2.5 border border-slate-300 rounded-xl text-gray-900 focus:ring-2 focus:ring-accent focus:border-accent transition">
        </div>
      </div>

      <div class="flex items-center justify-end gap-3 mt-8 pt-6 border-t border-slate-100">
        <a href="{% url 'progress_criteria_list' %}"
           class="px-5 py-2.5 text-gray-600 font-semibold rounded-xl hover:bg-gray-100 transition">Cancel</a>
        <button type="submit"
                class="px-6 py-2.5 bg-accent text-white font-semibold rounded-xl hover:bg-accent-dark transition shadow-sm">
          Create Criteria
        </button>
      </div>
    </form>
  </div>

</div>
{% endblock %}
