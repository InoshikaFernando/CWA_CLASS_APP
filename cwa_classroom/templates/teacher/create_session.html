{% extends "base.html" %}
{% block title %}Create Session — {{ classroom.name }}{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto space-y-6">
  <div>
    <a href="{% url 'class_detail' class_id=classroom.id %}" class="text-accent hover:text-accent-dark text-sm font-medium transition">&larr; Back to {{ classroom.name }}</a>
    <h1 class="font-display text-2xl font-bold text-gray-900 mt-2">Create Session</h1>
    <p class="text-gray-500 text-sm mt-1">Schedule a session for {{ classroom.name }}.</p>
  </div>

  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
    <form method="post" class="space-y-5">
      {% csrf_token %}

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Date</label>
        <input type="date" name="date" required value="{{ default_date }}"
               class="w-full rounded-lg border border-gray-300 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition" />
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Start Time</label>
          <input type="time" name="start_time" value="{{ default_start }}"
                 class="w-full rounded-lg border border-gray-300 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">End Time</label>
          <input type="time" name="end_time" value="{{ default_end }}"
                 class="w-full rounded-lg border border-gray-300 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition" />
        </div>
      </div>

      <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" name="go_to_attendance"
               class="rounded text-accent focus:ring-accent">
        <span class="text-sm text-gray-700">Go to attendance marking after creation</span>
      </label>

      <div class="flex gap-3 pt-2">
        <button type="submit" class="bg-accent hover:bg-accent-dark text-white font-semibold rounded-xl px-6 py-3 transition">
          Create Session
        </button>
        <a href="{% url 'class_detail' class_id=classroom.id %}" class="bg-white border border-gray-300 text-gray-600 hover:bg-gray-50 font-semibold rounded-xl px-6 py-3 transition">
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
