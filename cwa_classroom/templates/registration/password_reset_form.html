{% extends "base_auth.html" %}
{% block title %}Reset Password{% endblock %}
{% block card_content %}
  <h1 class="font-display text-3xl text-primary text-center mb-2">Reset Password</h1>
  <p class="text-center text-gray-400 text-sm mb-8">Enter your email and we'll send a reset link.</p>
  <form method="post" class="space-y-5">
    {% csrf_token %}
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1.5">Email address</label>
      <input type="email" name="email" required autofocus
             class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-gray-700 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition" />
    </div>
    <button type="submit" class="w-full bg-primary hover:bg-primary-dark text-white font-semibold rounded-xl px-5 py-3 transition">
      Send Reset Link →
    </button>
  </form>
{% endblock %}
{% block footer_links %}
  <a href="{% url 'login' %}" class="hover:text-primary transition">Back to Login</a>
{% endblock %}
