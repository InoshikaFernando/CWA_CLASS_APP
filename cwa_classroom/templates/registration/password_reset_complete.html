{% extends "base_auth.html" %}
{% block title %}Password Reset Complete{% endblock %}
{% block card_content %}
  <div class="text-center">
    <div class="text-5xl mb-4">✅</div>
    <h1 class="font-display text-2xl text-primary mb-2">Password updated!</h1>
    <p class="text-gray-500 text-sm mb-6">Your password has been set. You can now log in.</p>
    <a href="{% url 'login' %}" class="w-full inline-block bg-primary hover:bg-primary-dark text-white font-semibold rounded-xl px-5 py-3 transition">
      Log In →
    </a>
  </div>
{% endblock %}
