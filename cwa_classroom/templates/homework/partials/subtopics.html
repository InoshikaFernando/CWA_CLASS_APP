{% if subtopics %}
<div class="space-y-1">
  <label class="block text-sm font-semibold text-gray-700 mb-1">Subtopics</label>
  <div class="space-y-1 pl-1">
    {% for st in subtopics %}
    <label class="flex items-center gap-2 text-sm text-gray-600">
      <input type="checkbox" name="subtopics" value="{{ st.pk }}" checked class="rounded text-blue-600 focus:ring-blue-500">
      {{ st.name }}
    </label>
    {% endfor %}
  </div>
</div>
{% endif %}
