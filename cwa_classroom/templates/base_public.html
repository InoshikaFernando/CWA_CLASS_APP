{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Classroom{% endblock %} — CWA / Wizards Learning Hub</title>
  <meta name="description" content="{% block meta_description %}A comprehensive educational platform for students ages 6-12.{% endblock %}" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph -->
  <meta property="og:title" content="{% block og_title %}Classroom{% endblock %}" />
  <meta property="og:description" content="{% block og_description %}Explore subjects, practise skills, and track your progress.{% endblock %}" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ request.build_absolute_uri }}" />

  <!-- Google Fonts (Inter, Nunito) — self-hosted -->
  <link href="{% static 'css/google-fonts-main.css' %}" rel="stylesheet" />

  <!-- Tailwind CSS — self-hosted -->
  <script src="{% static 'js/tailwind.min.js' %}"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Inter', 'sans-serif'],
            body: ['Nunito', 'sans-serif'],
          },
          colors: {
            primary: { DEFAULT: '#1e293b', dark: '#0f172a', light: '#f1f5f9' },
            accent:  { DEFAULT: '#3b82f6', dark: '#2563eb', light: '#dbeafe' },
            success: { DEFAULT: '#059669', dark: '#047857', light: '#d1fae5' },
            danger:  { DEFAULT: '#ef4444', dark: '#dc2626', light: '#fee2e2' },
            border:  '#e2e8f0',
          },
        },
      },
    }
  </script>

  {% block extra_head %}{% endblock %}
</head>
<body class="bg-white font-body text-gray-700 antialiased">

  <!-- Skip to content (accessibility) -->
  <a href="#main-content"
     class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:z-[100] focus:bg-primary focus:text-white focus:px-4 focus:py-2 focus:rounded-lg">
    Skip to main content
  </a>

  {% include "partials/public_nav.html" %}

  <main id="main-content">
    {% block content %}{% endblock %}
  </main>

  {% include "partials/public_footer.html" %}

  {% block extra_js %}{% endblock %}
</body>
</html>
