<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block email_title %}{{ site_name }}{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background-color:#f1f5f9;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f1f5f9;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">

          <!-- Header -->
          <tr>
            <td style="background-color:#1e293b;padding:24px 32px;border-radius:12px 12px 0 0;text-align:center;">
              {% if email_logo_url %}
              <img src="{{ email_logo_url }}" alt="{{ site_name }}" style="max-height:48px;max-width:200px;margin-bottom:12px;" />
              <br />
              {% endif %}
              <h1 style="margin:0;color:#ffffff;font-size:22px;font-weight:700;">
                {{ site_name }}
              </h1>
            </td>
          </tr>

          <!-- Content -->
          <tr>
            <td style="background-color:#ffffff;padding:32px;">
              {% block email_content %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#f8fafc;padding:24px 32px;border-radius:0 0 12px 12px;border-top:1px solid #e2e8f0;">
              {% block email_footer_extra %}{% endblock %}
              <p style="margin:0 0 8px;color:#64748b;font-size:13px;text-align:center;">
                &copy; {{ current_year }} {{ site_name }}. All rights reserved.
              </p>
              {% if unsubscribe_url %}
              <p style="margin:0;text-align:center;">
                <a href="{{ unsubscribe_url }}" style="color:#94a3b8;font-size:12px;text-decoration:underline;">
                  Unsubscribe from emails
                </a>
              </p>
              {% endif %}
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
