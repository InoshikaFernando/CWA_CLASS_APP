{% extends "base_auth.html" %}
{% block title %}No Role Assigned{% endblock %}
{% block card_content %}
  <div class="text-center">
    <div class="text-5xl mb-4">🔒</div>
    <h1 class="font-display text-2xl text-primary mb-2">No role assigned</h1>
    <p class="text-gray-500 text-sm mb-6">
      Your account doesn't have a role yet. Please contact your administrator to get access.
    </p>
    <form method="post" action="{% url 'logout' %}">
      {% csrf_token %}
      <button type="submit" class="text-sm text-red-500 hover:text-red-700 font-semibold transition">
        Log Out
      </button>
    </form>
  </div>
{% endblock %}
