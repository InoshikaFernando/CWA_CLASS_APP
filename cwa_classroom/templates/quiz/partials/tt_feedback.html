<div class="rounded-2xl border-2 p-8 text-center
            {% if is_correct %}border-green-300 bg-green-50{% else %}border-red-200 bg-red-50{% endif %}">

  <div class="text-5xl mb-4">{% if is_correct %}✅{% else %}❌{% endif %}</div>

  <p class="font-bold text-2xl mb-2 {% if is_correct %}text-green-700{% else %}text-red-600{% endif %}">
    {% if is_correct %}Correct!{% else %}Not quite!{% endif %}
  </p>

  {% if not is_correct %}
    <p class="text-gray-600 mb-6">The answer was <strong class="text-gray-800 text-xl">{{ correct_answer }}</strong></p>
  {% else %}
    <p class="text-green-600 mb-6 text-lg">Great work! Keep going 💪</p>
  {% endif %}

  {% if is_last_question %}
    <a href="{{ next_url }}"
       class="inline-block bg-primary hover:bg-primary-dark text-white font-bold rounded-xl px-8 py-3 transition text-lg">
      See Results →
    </a>
  {% else %}
    <button type="button"
            class="bg-primary hover:bg-primary-dark text-white font-bold rounded-xl px-8 py-3 transition text-lg"
            onclick="loadNextTTQuestion()">
      Next Question →
    </button>
    <script>
      function loadNextTTQuestion() {
        fetch("{{ next_question_url }}", {
          headers: { 'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').content }
        })
        .then(r => r.text())
        .then(html => { document.getElementById('question-container').innerHTML = html; });
      }
    </script>
  {% endif %}

</div>
