<div class="rounded-2xl border-2 p-6 {% if is_correct %}border-green-300 bg-green-50{% else %}border-red-200 bg-red-50{% endif %}">

  <!-- Result icon + message -->
  <div class="flex items-center gap-3 mb-4">
    <span class="text-3xl">{% if is_correct %}✅{% else %}❌{% endif %}</span>
    <div>
      <p class="font-bold text-lg {% if is_correct %}text-green-700{% else %}text-red-600{% endif %}">
        {% if is_correct %}Correct!{% else %}Not quite!{% endif %}
      </p>
      {% if not is_correct %}
        <p class="text-sm text-gray-600">The answer was: <strong>{{ correct_answer_text }}</strong></p>
      {% endif %}
    </div>
  </div>

  <!-- Explanation -->
  {% if explanation %}
    <div class="bg-white rounded-xl px-4 py-3 text-sm text-gray-600 mb-4 border border-gray-100">
      💡 {{ explanation }}
    </div>
  {% endif %}

  <!-- Next button -->
  {% if is_last_question %}
    <a href="{{ next_url }}"
       class="block w-full text-center bg-primary hover:bg-primary-dark text-white font-bold rounded-xl px-5 py-3 transition">
      See Results →
    </a>
  {% else %}
    <button type="button"
            class="w-full bg-primary hover:bg-primary-dark text-white font-bold rounded-xl px-5 py-3 transition"
            hx-get="{{ next_question_url|default:'' }}"
            hx-target="#question-container"
            hx-swap="innerHTML">
      Next Question →
    </button>
  {% endif %}

</div>
