<div class="flex gap-1 mb-8 border-b border-slate-200">
  <a href="{% url 'email_dashboard' %}"
     class="px-4 py-2.5 text-sm font-semibold border-b-2 -mb-px transition
            {% if active_tab == 'campaigns' %}border-accent text-accent{% else %}border-transparent text-gray-500 hover:text-gray-700{% endif %}">
    Campaigns
  </a>
  <a href="{% url 'email_log_list' %}"
     class="px-4 py-2.5 text-sm font-semibold border-b-2 -mb-px transition
            {% if active_tab == 'transactional' %}border-accent text-accent{% else %}border-transparent text-gray-500 hover:text-gray-700{% endif %}">
    Transactional Emails
    {% if total_failed > 0 and active_tab != 'transactional' %}
      <span class="ml-1.5 text-xs font-bold bg-red-100 text-red-700 px-1.5 py-0.5 rounded-full">{{ total_failed }} failed</span>
    {% endif %}
  </a>
</div>
