<td class="px-4 py-3 text-gray-400 text-xs">{{ q.id }}</td>
<td class="px-4 py-3">
  <p class="text-gray-900 font-medium line-clamp-2">{{ q.question_text }}</p>
</td>
<td class="px-4 py-3 text-gray-600">{{ q.level.display_name }}</td>
<td class="px-4 py-3">
  {% if q.topic %}
    {% if q.topic.parent %}
      <span class="text-xs text-gray-400">{{ q.topic.parent.name }} &rsaquo;</span><br>
    {% endif %}
    <span class="text-gray-600">{{ q.topic.name }}</span>
  {% else %}
    <span class="text-gray-400">--</span>
  {% endif %}
</td>
<td class="px-4 py-3">
  <span class="inline-flex px-2 py-0.5 rounded-full text-xs font-medium
    {% if q.question_type == 'multiple_choice' %}bg-blue-50 text-blue-700
    {% elif q.question_type == 'true_false' %}bg-purple-50 text-purple-700
    {% elif q.question_type == 'calculation' %}bg-amber-50 text-amber-700
    {% else %}bg-gray-100 text-gray-600{% endif %}">
    {{ q.get_question_type_display }}
  </span>
</td>
<td class="px-4 py-3 text-center">
  {% if q.image %}
    <button onclick="openImageModal('{{ q.image.url }}')" class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-emerald-50 text-emerald-600 hover:bg-emerald-100 transition" title="View image">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5a2.25 2.25 0 002.25-2.25V6a2.25 2.25 0 00-2.25-2.25H3.75A2.25 2.25 0 001.5 6v12.75a2.25 2.25 0 002.25 2.25z"/>
      </svg>
    </button>
  {% else %}
    <span class="text-gray-300">&mdash;</span>
  {% endif %}
</td>
<td class="px-4 py-3 text-center text-gray-600">{{ q.answers.count }}</td>
<td class="px-4 py-3">
  <button onclick="openEditModal({{ q.id }})"
          class="inline-flex items-center gap-1 px-2.5 py-1.5 text-xs font-medium text-accent bg-accent/5 rounded-lg hover:bg-accent/10 transition">
    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10"/>
    </svg>
    Edit
  </button>
</td>
