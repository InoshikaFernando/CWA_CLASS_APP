{% if results %}
  <ul class="divide-y divide-slate-100 rounded-xl border border-slate-200 overflow-hidden">
    {% for ss in results %}
      <li>
        <a href="{% url 'admin_school_student_edit' school_id=ss.school.id student_id=ss.student.id %}"
           class="flex items-center justify-between gap-3 px-4 py-3 hover:bg-slate-50 transition">
          <div>
            <p class="font-medium text-gray-900 text-sm">{{ ss.student.get_full_name }}</p>
            <p class="text-xs text-gray-500">{{ ss.school.name }}{% if ss.student.email %} · {{ ss.student.email }}{% endif %}</p>
          </div>
          <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/>
          </svg>
        </a>
      </li>
    {% endfor %}
  </ul>
{% elif q %}
  <p class="text-sm text-gray-500 text-center py-4">No students found for "{{ q }}".</p>
{% endif %}
