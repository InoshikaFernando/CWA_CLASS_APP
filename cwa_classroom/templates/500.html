{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Something went wrong — CWA / Wizards Learning Hub</title>
  <link href="{% static 'css/google-fonts-error.css' %}" rel="stylesheet" />
  <script src="{% static 'js/tailwind.min.js' %}"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Fredoka One', 'cursive'],
            body: ['Nunito', 'sans-serif'],
          },
          colors: {
            primary: { DEFAULT: '#2563eb', dark: '#1d4ed8', light: '#dbeafe' },
          },
        },
      },
    }
  </script>
</head>
<body class="bg-white font-body text-gray-700 antialiased">
  <section class="py-20 bg-gradient-to-br from-blue-50 to-slate-50 min-h-screen flex items-center">
    <div class="max-w-2xl mx-auto px-4 text-center">
      <div class="mb-8">
        <span class="font-display text-8xl text-primary/30">500</span>
      </div>
      <h1 class="font-display text-3xl text-gray-800 mb-4">Something went wrong</h1>
      <p class="text-gray-500 mb-8">
        We're sorry, something went wrong on our end. Please try again later
        or contact us at
        <a href="mailto:contact@wizardslearninghub.co.nz" class="text-primary hover:underline">contact@wizardslearninghub.co.nz</a>.
      </p>
      <a href="/"
         class="inline-block bg-primary text-white hover:bg-primary-dark rounded-xl px-6 py-3 font-semibold transition">
        Back to Home
      </a>
    </div>
  </section>
</body>
</html>
