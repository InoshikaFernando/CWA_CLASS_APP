{% extends "base.html" %}

{% block title %}Join a Class{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8">

  <div class="text-center mb-8">
    <p class="text-5xl mb-3">🎓</p>
    <h1 class="text-2xl font-display font-bold text-gray-900">Join a Class</h1>
    <p class="text-emerald-500 mt-2 font-semibold">Enter the class code provided by your teacher</p>
  </div>

  <div class="bg-white rounded-2xl border border-emerald-100 shadow-md shadow-emerald-100 p-8">
    <form method="post">
      {% csrf_token %}
      <div class="mb-6">
        <label for="code" class="block text-sm font-semibold text-emerald-700 mb-2">Class Code</label>
        <input type="text" name="code" id="code" required maxlength="8"
               value="{{ form_data.code|default:'' }}"
               class="w-full px-4 py-3 border-2 border-emerald-200 rounded-xl text-center text-xl font-mono tracking-widest text-gray-900 uppercase focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 transition"
               placeholder="ABCD1234"
               autocomplete="off">
        <p class="text-xs text-gray-400 mt-2 text-center">8-character code (letters and numbers)</p>
      </div>
      <button type="submit"
              class="w-full px-6 py-3 bg-emerald-500 text-white font-bold rounded-xl hover:bg-emerald-600 transition shadow-sm">
        Request to Join
      </button>
    </form>
  </div>

  <div class="text-center mt-6">
    <a href="{% url 'student_my_classes' %}" class="text-sm text-emerald-600 hover:text-emerald-700 font-semibold">View my classes &rarr;</a>
  </div>

</div>
{% endblock %}
