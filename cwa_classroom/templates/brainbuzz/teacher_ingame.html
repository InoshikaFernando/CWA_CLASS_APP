{% extends "base.html" %}
{% block title %}BrainBuzz — {{ session.join_code }}{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto py-4 space-y-5"
     x-data="bbTeacher('{{ session.join_code }}', {{ session.state_version }}, {{ session.current_question_index|default:'null' }}, {{ session.questions.count }})"
     x-init="startPolling()">

  <!-- Top bar -->
  <div class="flex items-center justify-between flex-wrap gap-3">
    <div class="flex items-center gap-3">
      <span class="font-mono text-2xl font-black text-primary tracking-widest">{{ session.join_code }}</span>
      <span class="text-sm text-gray-500" x-text="`Q${(currentIndex ?? 0) + 1} of ${totalQuestions}`"></span>
    </div>
    <div class="flex items-center gap-2">
      <span class="text-3xl font-black tabular-nums text-accent" x-text="countdown > 0 ? countdown : '—'"></span>
      <span class="text-sm text-gray-500">sec</span>
      <button @click="nextQuestion()"
              class="ml-4 bg-accent hover:bg-blue-600 text-white font-semibold px-5 py-2 rounded-xl transition text-sm">
        Next &rarr;
      </button>
      <button @click="endGame()"
              class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold px-4 py-2 rounded-xl transition text-sm">
        End
      </button>
    </div>
  </div>

  <!-- Question card (large, projector-friendly) -->
  <div class="bg-primary rounded-2xl p-8 text-white min-h-[10rem] flex items-center justify-center">
    <p class="text-3xl font-bold text-center leading-snug" x-text="questionText || 'Loading…'"></p>
  </div>

  <!-- Answer tiles (MCQ/TF display only — teacher doesn't click) -->
  <template x-if="options.length > 0">
    <div class="grid grid-cols-2 gap-3">
      <template x-for="(opt, idx) in options" :key="opt.id">
        <div :class="tileClasses[idx % 4]"
             class="rounded-2xl px-6 py-5 flex items-center gap-4 text-white font-semibold">
          <span class="w-9 h-9 rounded-full bg-black/20 flex items-center justify-center font-black text-sm flex-shrink-0"
                x-text="['A','B','C','D'][idx]"></span>
          <span class="text-lg leading-snug" x-text="opt.text"></span>
        </div>
      </template>
    </div>
  </template>

  <!-- Submission count bar -->
  <div class="bg-white border border-gray-200 rounded-xl px-5 py-3 flex items-center justify-between text-sm">
    <span class="text-gray-600">Answers received</span>
    <span class="font-bold text-gray-900" x-text="`${submissionCount} / ${participantCount}`"></span>
  </div>

  <!-- Leaderboard (top 10) -->
  <div class="bg-white border border-gray-200 rounded-2xl overflow-hidden shadow-sm">
    <div class="px-5 py-3 border-b border-gray-100 font-semibold text-gray-900">Live Leaderboard</div>
    <ol class="divide-y divide-gray-50">
      <template x-for="(p, idx) in leaderboard.slice(0,10)" :key="p.id">
        <li class="flex items-center gap-3 px-5 py-2.5">
          <span class="w-6 text-center font-black text-gray-400 text-sm" x-text="idx + 1"></span>
          <span class="flex-1 font-medium text-gray-800 truncate" x-text="p.nickname"></span>
          <span class="font-bold text-accent" x-text="p.total_score.toLocaleString()"></span>
        </li>
      </template>
      <li x-show="leaderboard.length === 0" class="px-5 py-3 text-sm text-gray-400">No scores yet.</li>
    </ol>
  </div>
</div>

<script>
function bbTeacher(joinCode, initialVersion, initialIndex, totalQuestions) {
  return {
    joinCode,
    stateVersion: initialVersion,
    currentIndex: initialIndex,
    totalQuestions,
    questionText: '',
    options: [],
    countdown: 0,
    leaderboard: [],
    participantCount: 0,
    submissionCount: 0,
    deadlineUtc: null,
    countdownTimer: null,
    pollTimer: null,
    tileClasses: [
      'bg-red-500',
      'bg-blue-500',
      'bg-yellow-500',
      'bg-green-600',
    ],

    startPolling() {
      this.poll();
    },

    async poll() {
      try {
        const res = await fetch(`/brainbuzz/api/session/${this.joinCode}/state/?since=${this.stateVersion}`);
        if (res.ok && res.status !== 304) {
          const data = await res.json();
          this.applyState(data);
        }
      } catch (e) {}
      if (this.stateVersion !== -1) {
        this.pollTimer = setTimeout(() => this.poll(), 1500);
      }
    },

    applyState(data) {
      this.stateVersion = data.state_version;
      this.leaderboard = data.participants;
      this.participantCount = data.participant_count;
      this.currentIndex = data.current_question_index;

      if (data.state === 'ended') {
        window.location.href = `/brainbuzz/session/${this.joinCode}/end/`;
        return;
      }

      if (data.question) {
        const q = data.question;
        this.questionText = q.question_text;
        this.options = q.options || [];
        this.deadlineUtc = q.question_deadline_utc ? new Date(q.question_deadline_utc) : null;
        this.tickCountdown();
      }

      // Count submissions for current question
      this.fetchSubmissionCount();
    },

    tickCountdown() {
      if (this.countdownTimer) clearInterval(this.countdownTimer);
      this.countdownTimer = setInterval(() => {
        if (!this.deadlineUtc) { this.countdown = 0; return; }
        const remaining = (this.deadlineUtc - Date.now()) / 1000;
        this.countdown = Math.max(0, Math.ceil(remaining));
      }, 200);
    },

    async fetchSubmissionCount() {
      try {
        const res = await fetch(`/brainbuzz/api/session/${this.joinCode}/leaderboard/`);
        if (res.ok) {
          const data = await res.json();
          this.leaderboard = data.leaderboard;
        }
      } catch (e) {}
    },

    async nextQuestion() {
      const csrfToken = document.querySelector('meta[name="csrf-token"]').content;
      await fetch(`/brainbuzz/api/session/${this.joinCode}/action/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
        body: JSON.stringify({ action: 'next', expected_current_index: this.currentIndex }),
      });
      this.poll();
    },

    async endGame() {
      if (!confirm('End the session for everyone?')) return;
      const csrfToken = document.querySelector('meta[name="csrf-token"]').content;
      await fetch(`/brainbuzz/api/session/${this.joinCode}/action/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
        body: JSON.stringify({ action: 'end', expected_current_index: this.currentIndex }),
      });
      window.location.href = `/brainbuzz/session/${this.joinCode}/end/`;
    },
  };
}
</script>
{% endblock %}
