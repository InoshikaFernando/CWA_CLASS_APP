{% extends "base.html" %}
{% block title %}Join BrainBuzz{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
  <div class="w-full max-w-sm space-y-6" x-data="bbJoin('{{ prefill_code }}')">

    <!-- Brand -->
    <div class="text-center">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-accent mb-3">
        <svg class="w-9 h-9 text-white" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-black text-gray-900">BrainBuzz</h1>
      <p class="text-sm text-gray-500 mt-1">Enter your code to jump in!</p>
    </div>

    <!-- Error -->
    <div x-show="error" x-cloak
         class="bg-red-50 border border-red-200 rounded-lg px-4 py-3 text-sm text-red-700"
         x-text="error"></div>

    <!-- Form -->
    <form @submit.prevent="joinSession" class="space-y-4">
      <!-- Join code input -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1" for="join_code">Game Code</label>
        <input id="join_code" type="text"
               x-model="joinCode"
               maxlength="6"
               autocomplete="off"
               autocapitalize="characters"
               placeholder="ABCD12"
               class="w-full border border-gray-300 rounded-xl px-4 py-3 text-center text-2xl font-black font-mono tracking-widest uppercase focus:outline-none focus:ring-2 focus:ring-accent">
      </div>

      <!-- Nickname -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1" for="nickname">Your Nickname</label>
        <input id="nickname" type="text"
               x-model="nickname"
               maxlength="50"
               placeholder="{% if user.is_authenticated %}{{ user.first_name|default:user.username }}{% else %}Enter nickname{% endif %}"
               class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-accent">
        <p class="mt-1 text-xs text-gray-400">Shown on the leaderboard. You can change it.</p>
      </div>

      <button type="submit"
              :disabled="loading || joinCode.length < 6 || !nickname.trim()"
              class="w-full bg-accent hover:bg-blue-600 disabled:opacity-40 disabled:cursor-not-allowed text-white font-black text-lg py-3.5 rounded-xl transition">
        <span x-show="!loading">Let's Go!</span>
        <span x-show="loading" x-cloak>Joining…</span>
      </button>
    </form>

  </div>
</div>

<script>
function bbJoin(prefillCode) {
  return {
    joinCode: prefillCode || '',
    nickname: '{% if user.is_authenticated %}{{ user.first_name|default:user.username|escapejs }}{% endif %}',
    loading: false,
    error: '',

    async joinSession() {
      this.error = '';
      this.loading = true;
      try {
        const csrfToken = document.querySelector('meta[name="csrf-token"]').content;
        const res = await fetch('/brainbuzz/api/join/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
          body: JSON.stringify({
            join_code: this.joinCode.trim().toUpperCase(),
            nickname: this.nickname.trim(),
          }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = data.redirect_url;
        } else {
          this.error = data.error || 'Something went wrong. Try again.';
        }
      } catch (e) {
        this.error = 'Network error. Check your connection.';
      } finally {
        this.loading = false;
      }
    },
  };
}
</script>
{% endblock %}
