{% extends "base.html" %}
{% block title %}Invoices — {{ active_child.first_name }}{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-6">

  <div>
    <h1 class="font-display text-3xl text-gray-800">Invoices</h1>
    <p class="text-violet-500 text-sm mt-1 font-semibold">{{ active_child.first_name }} {{ active_child.last_name }} &middot; {{ active_school.name }}</p>
  </div>

  <!-- Search & Filter -->
  <div class="flex flex-col sm:flex-row gap-3">
    <div class="relative flex-1">
      <svg class="w-5 h-5 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/>
      </svg>
      <input type="text" name="q" value="{{ search }}"
             hx-get="{% url 'parent_invoices' %}"
             hx-trigger="keyup changed delay:300ms"
             hx-target="#results-table"
             hx-swap="innerHTML"
             hx-include="[name='status']"
             hx-push-url="true"
             placeholder="Search invoices..."
             class="w-full pl-10 pr-4 py-2.5 border border-slate-300 rounded-xl text-sm focus:ring-2 focus:ring-violet-200 focus:border-violet-400 transition">
    </div>
    <select name="status"
            hx-get="{% url 'parent_invoices' %}"
            hx-trigger="change"
            hx-target="#results-table"
            hx-swap="innerHTML"
            hx-include="[name='q']"
            hx-push-url="true"
            class="px-4 py-2.5 border border-slate-300 rounded-xl text-sm focus:ring-2 focus:ring-violet-200 focus:border-violet-400 transition">
      <option value="">All Statuses</option>
      <option value="issued" {% if status_filter == 'issued' %}selected{% endif %}>Issued</option>
      <option value="partially_paid" {% if status_filter == 'partially_paid' %}selected{% endif %}>Partially Paid</option>
      <option value="paid" {% if status_filter == 'paid' %}selected{% endif %}>Paid</option>
    </select>
  </div>

  <div id="results-table">
    {% include "parent/partials/invoice_table.html" %}
  </div>

</div>
{% endblock %}
