{% comment %}
Alpine.js client-side pagination controls.
Usage: Include inside an x-data scope that defines: page, perPage, total
Example: <div x-data="{ page: 1, perPage: 10, total: {{ items|length }} }">
{% endcomment %}
<template x-if="total > perPage">
  <nav class="flex items-center justify-between mt-4 pt-4 border-t border-slate-100" aria-label="Pagination">
    <p class="text-xs text-gray-500">
      Showing <span class="font-semibold text-gray-700" x-text="(page - 1) * perPage + 1"></span>–<span class="font-semibold text-gray-700" x-text="Math.min(page * perPage, total)"></span>
      of <span class="font-semibold text-gray-700" x-text="total"></span>
    </p>
    <div class="flex items-center gap-1">
      <button @click="page--" :disabled="page === 1"
              :class="page === 1 ? 'opacity-40 cursor-not-allowed' : 'hover:bg-slate-50'"
              class="inline-flex items-center gap-1 px-2.5 py-1.5 text-xs font-medium text-gray-600 bg-white border border-slate-200 rounded-lg transition">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
        </svg>
        Prev
      </button>
      <span class="text-xs text-gray-500 px-2" x-text="page + ' / ' + Math.ceil(total / perPage)"></span>
      <button @click="page++" :disabled="page >= Math.ceil(total / perPage)"
              :class="page >= Math.ceil(total / perPage) ? 'opacity-40 cursor-not-allowed' : 'hover:bg-slate-50'"
              class="inline-flex items-center gap-1 px-2.5 py-1.5 text-xs font-medium text-gray-600 bg-white border border-slate-200 rounded-lg transition">
        Next
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
        </svg>
      </button>
    </div>
  </nav>
</template>
