{% if is_student or is_individual_student %}
<nav class="fixed bottom-0 inset-x-0 h-16 bg-white/95 backdrop-blur-lg border-t-2 border-emerald-300 z-40
            flex items-center justify-around px-2 shadow-[0_-2px_10px_rgba(5,150,105,0.1)]">

  <!-- Home -->
  <a href="/hub/" class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-xl
                     {% if request.path == '/hub/' %}text-emerald-600{% else %}text-gray-400 hover:text-emerald-500{% endif %} transition">
    <span class="text-lg leading-none">🏠</span>
    <span class="text-xs font-bold">Home</span>
  </a>

  <!-- Basic Facts -->
  <a href="{% url 'basic_facts_home' %}" class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-xl
                     {% if 'basic-facts' in request.path %}text-emerald-600{% else %}text-gray-400 hover:text-emerald-500{% endif %} transition">
    <span class="text-lg leading-none">⚡</span>
    <span class="text-xs font-bold">Facts</span>
  </a>

  <!-- Times Tables -->
  <a href="{% url 'times_tables_home' %}" class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-xl
                     {% if 'times-tables' in request.path %}text-emerald-600{% else %}text-gray-400 hover:text-emerald-500{% endif %} transition">
    <span class="text-lg leading-none">✖️</span>
    <span class="text-xs font-bold">Tables</span>
  </a>

  <!-- My Progress -->
  <a href="{% url 'student_dashboard' %}" class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-xl
                     {% if 'dashboard' in request.path %}text-emerald-600{% else %}text-gray-400 hover:text-emerald-500{% endif %} transition">
    <span class="text-lg leading-none">📊</span>
    <span class="text-xs font-bold">Progress</span>
  </a>

  <!-- Homework -->
  <a href="{% url 'homework:student_list' %}" class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-xl
                     {% if '/homework/' in request.path %}text-emerald-600{% else %}text-gray-400 hover:text-emerald-500{% endif %} transition">
    <span class="text-lg leading-none">📝</span>
    <span class="text-xs font-bold">Homework</span>
  </a>

</nav>

{% elif is_parent %}
<nav class="fixed bottom-0 inset-x-0 h-16 bg-white/95 backdrop-blur-lg border-t-2 border-violet-300 z-40
            flex items-center justify-around px-2 shadow-[0_-2px_10px_rgba(139,92,246,0.1)]">
  <a href="{% url 'parent_dashboard' %}" class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-xl
       {% if request.path == '/classroom/parent/' %}text-violet-600{% else %}text-gray-400 hover:text-violet-500{% endif %} transition">
    <span class="text-lg leading-none">🏠</span>
    <span class="text-xs font-bold">Home</span>
  </a>
  <a href="{% url 'parent_attendance' %}" class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-xl
       {% if 'attendance' in request.path %}text-violet-600{% else %}text-gray-400 hover:text-violet-500{% endif %} transition">
    <span class="text-lg leading-none">✅</span>
    <span class="text-xs font-bold">Attend</span>
  </a>
  <a href="{% url 'parent_invoices' %}" class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-xl
       {% if 'invoices' in request.path %}text-violet-600{% else %}text-gray-400 hover:text-violet-500{% endif %} transition">
    <span class="text-lg leading-none">🧾</span>
    <span class="text-xs font-bold">Invoices</span>
  </a>
  <a href="{% url 'parent_progress' %}" class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-xl
       {% if 'progress' in request.path %}text-violet-600{% else %}text-gray-400 hover:text-violet-500{% endif %} transition">
    <span class="text-lg leading-none">📊</span>
    <span class="text-xs font-bold">Progress</span>
  </a>
  <a href="{% url 'profile' %}" class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-xl
       {% if 'profile' in request.path %}text-violet-600{% else %}text-gray-400 hover:text-violet-500{% endif %} transition">
    <span class="text-lg leading-none">👤</span>
    <span class="text-xs font-bold">Profile</span>
  </a>
</nav>

{% elif is_teacher or is_hoi or is_hod or is_accountant %}
<nav class="fixed bottom-0 inset-x-0 h-16 bg-white border-t border-slate-200 z-40
            flex items-center justify-around px-2">

  <a href="/hub/" class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-xl
                     {% if request.path == '/hub/' %}text-primary{% else %}text-gray-400{% endif %} transition">
    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955a1.126 1.126 0 011.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/>
    </svg>
    <span class="text-xs font-semibold">Home</span>
  </a>

  <a href="{% url 'profile' %}" class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-xl text-gray-400 hover:text-primary transition">
    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
    </svg>
    <span class="text-xs font-semibold">Profile</span>
  </a>

  <!-- More drawer trigger -->
  <button onclick="openMobileDrawer()"
          class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-xl text-gray-400 hover:text-primary transition">
    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
    </svg>
    <span class="text-xs font-semibold">More</span>
  </button>

</nav>
{% endif %}
