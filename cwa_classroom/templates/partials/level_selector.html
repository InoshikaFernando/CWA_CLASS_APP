<!-- Dynamic Level Selector — loaded via JS after department selection -->
<div id="level-section" class="hidden space-y-5">
  <!-- Year Levels -->
  <div id="year-levels-container" class="hidden">
    <label class="block text-sm font-semibold text-gray-700 mb-2">Year Levels</label>
    <p class="text-xs text-gray-400 mb-3">Students will have access to topics from the selected levels.</p>
    <div id="year-levels-grid" class="grid grid-cols-4 gap-3"></div>
  </div>

  <!-- Custom Levels -->
  <div id="custom-levels-container" class="hidden">
    <label class="block text-sm font-semibold text-gray-700 mb-2">Custom Levels</label>
    <p class="text-xs text-gray-400 mb-3">School-specific levels for this department.</p>
    <div id="custom-levels-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
  </div>

  <!-- No levels message -->
  <div id="no-levels-msg" class="hidden">
    <p class="text-sm text-gray-400 bg-gray-50 rounded-xl p-4 text-center">
      No levels configured for this department yet. Ask an administrator to set up levels.
    </p>
  </div>
</div>

<script>
function loadDepartmentLevels(deptId) {
  const section = document.getElementById('level-section');
  const yearContainer = document.getElementById('year-levels-container');
  const customContainer = document.getElementById('custom-levels-container');
  const yearGrid = document.getElementById('year-levels-grid');
  const customGrid = document.getElementById('custom-levels-grid');
  const noMsg = document.getElementById('no-levels-msg');

  // Reset
  yearGrid.innerHTML = '';
  customGrid.innerHTML = '';
  yearContainer.classList.add('hidden');
  customContainer.classList.add('hidden');
  noMsg.classList.add('hidden');

  if (!deptId) {
    section.classList.add('hidden');
    return;
  }

  section.classList.remove('hidden');

  fetch('/api/department/' + deptId + '/levels/')
    .then(r => r.json())
    .then(data => {
      if (data.levels && data.levels.length > 0) {
        yearContainer.classList.remove('hidden');
        data.levels.forEach(lv => {
          yearGrid.innerHTML += `
            <label class="flex flex-col items-center justify-center gap-1 p-3 rounded-xl border-2 border-gray-200
                           hover:border-primary cursor-pointer transition has-[:checked]:border-primary has-[:checked]:bg-primary-light">
              <input type="checkbox" name="levels" value="${lv.id}" class="sr-only" />
              <span class="font-display text-xl text-primary">${lv.level_number}</span>
              <span class="text-xs text-gray-500">${lv.display_name}</span>
            </label>`;
        });
      }

      if (data.custom_levels && data.custom_levels.length > 0) {
        customContainer.classList.remove('hidden');
        data.custom_levels.forEach(lv => {
          customGrid.innerHTML += `
            <label class="flex flex-col items-center justify-center gap-1 p-3 rounded-xl border-2 border-gray-200
                           hover:border-accent cursor-pointer transition has-[:checked]:border-accent has-[:checked]:bg-accent-light">
              <input type="checkbox" name="levels" value="${lv.id}" class="sr-only" />
              <span class="text-sm font-semibold text-accent">${lv.display_name}</span>
              ${lv.description ? `<span class="text-xs text-gray-400">${lv.description}</span>` : ''}
            </label>`;
        });
      }

      if ((!data.levels || data.levels.length === 0) && (!data.custom_levels || data.custom_levels.length === 0)) {
        noMsg.classList.remove('hidden');
      }
    })
    .catch(() => {
      noMsg.classList.remove('hidden');
      noMsg.querySelector('p').textContent = 'Failed to load levels. Please try again.';
    });
}
</script>
