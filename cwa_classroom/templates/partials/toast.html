{% if messages %}
<div id="toast-container"
     class="fixed bottom-20 md:bottom-6 right-4 z-50 flex flex-col gap-2 max-w-sm">
  {% for message in messages %}
  <div class="toast-item flex items-start gap-3 px-4 py-3 rounded-2xl shadow-lg text-sm font-semibold
              {% if message.tags == 'error' %}bg-red-500 text-white
              {% elif message.tags == 'warning' %}bg-yellow-400 text-yellow-900
              {% elif message.tags == 'success' %}bg-primary text-white
              {% else %}bg-blue-500 text-white{% endif %}"
       x-data="{ show: true }"
       x-show="show"
       x-init="setTimeout(() => show = false, 4000)">

    <!-- Icon -->
    {% if message.tags == 'error' %}
      <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/>
      </svg>
    {% elif message.tags == 'success' %}
      <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
    {% else %}
      <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/>
      </svg>
    {% endif %}

    <span>{{ message }}</span>

    <!-- Close -->
    <button onclick="this.parentElement.remove()" class="ml-auto flex-shrink-0 opacity-70 hover:opacity-100">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>
  {% endfor %}
</div>

<script>
  // Auto-dismiss toasts after 4 seconds
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.toast-item').forEach(el => {
      setTimeout(() => {
        el.style.opacity = '0';
        el.style.transition = 'opacity 0.3s';
        setTimeout(() => el.remove(), 300);
      }, 4000);
    });
  });
</script>
{% endif %}
