<!-- Parent sidebar — navy/dark theme -->
<div class="flex flex-col h-full py-6">

  <!-- Child switcher -->
  {% if children %}
  <div x-data="{ open: false }" class="relative px-3 mb-6">
    <button @click="open = !open"
            class="w-full flex items-center gap-3 px-4 py-3 rounded-2xl bg-white/10 hover:bg-white/15 border border-white/10 text-white transition">
      <span class="w-9 h-9 rounded-full bg-indigo-400/30 border border-indigo-300/30 flex items-center justify-center text-sm font-bold text-indigo-100 shrink-0">
        {% if active_child %}{{ active_child.first_name|slice:":1" }}{{ active_child.last_name|slice:":1" }}{% endif %}
      </span>
      <div class="flex-1 text-left min-w-0">
        <p class="text-sm font-semibold text-white truncate">
          {% if active_child %}{{ active_child.first_name }} {{ active_child.last_name }}{% else %}Select Child{% endif %}
        </p>
        <p class="text-xs text-slate-400 truncate">{% if active_school %}{{ active_school.name }}{% endif %}</p>
      </div>
      <svg class="w-4 h-4 text-slate-400 shrink-0 transition-transform duration-200"
           :class="open && 'rotate-180'" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
      </svg>
    </button>

    <div x-show="open" x-transition @click.away="open = false"
         class="absolute left-3 right-3 mt-1 bg-white rounded-xl shadow-2xl border border-slate-100 z-50 py-2 max-h-52 overflow-y-auto">
      {% for link in children %}
        <form method="post" action="{% url 'parent_switch_child' link.student.id %}">
          {% csrf_token %}
          <button type="submit"
                  class="w-full text-left px-4 py-2.5 hover:bg-slate-50 flex items-center gap-3 transition
                         {% if active_child and link.student.id == active_child.id %}bg-indigo-50{% endif %}">
            <span class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-xs font-bold shrink-0">
              {{ link.student.first_name|slice:":1" }}{{ link.student.last_name|slice:":1" }}
            </span>
            <div class="min-w-0">
              <p class="text-sm font-medium text-gray-800 truncate">{{ link.student.first_name }} {{ link.student.last_name }}</p>
              <p class="text-xs text-gray-400 truncate">{{ link.school.name }}</p>
            </div>
            {% if active_child and link.student.id == active_child.id %}
              <svg class="w-4 h-4 text-indigo-500 ml-auto shrink-0" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
              </svg>
            {% endif %}
          </button>
        </form>
      {% endfor %}
    </div>
  </div>
  {% endif %}

  <!-- Navigation -->
  <nav class="flex-1 px-3 space-y-0.5">

    <a href="{% url 'parent_dashboard' %}"
       class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition
              {% if request.path == '/parent/' or request.path == '/classroom/parent/' %}
                bg-indigo-500/20 text-white border border-indigo-400/20
              {% else %}
                text-slate-300 hover:bg-white/8 hover:text-white
              {% endif %}">
      <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955a1.126 1.126 0 011.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/>
      </svg>
      Dashboard
    </a>

    <a href="{% url 'parent_add_child' %}"
       class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition
              {% if 'add-child' in request.path %}bg-white/20 text-white{% else %}text-white/70 hover:bg-white/10 hover:text-white{% endif %}">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
      </svg>
      Add Child
    </a>


    <a href="{% url 'parent_dashboard' %}"
       class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition
              {% if 'children' in request.path %}
                bg-indigo-500/20 text-white border border-indigo-400/20
              {% else %}
                text-slate-300 hover:bg-white/8 hover:text-white
              {% endif %}">
      <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/>
      </svg>
      My Children
    </a>

    <!-- Section divider -->
    <div class="pt-3 pb-1">
      <p class="px-4 text-[10px] font-semibold uppercase tracking-wider text-slate-500">Academics</p>
    </div>

    <a href="{% url 'parent_classes' %}"
       class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition
              {% if 'classes' in request.path %}
                bg-indigo-500/20 text-white border border-indigo-400/20
              {% else %}
                text-slate-300 hover:bg-white/8 hover:text-white
              {% endif %}">
      <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.436 60.436 0 00-.491 6.347A48.627 48.627 0 0112 20.904a48.627 48.627 0 018.232-4.41 60.46 60.46 0 00-.491-6.347m-15.482 0a50.57 50.57 0 00-2.658-.813A59.905 59.905 0 0112 3.493a59.902 59.902 0 0110.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.697 50.697 0 0112 13.489a50.702 50.702 0 017.74-3.342M6.75 15a.75.75 0 100-1.5.75.75 0 000 1.5zm0 0v-3.675A55.378 55.378 0 0112 8.443m-7.007 11.55A5.981 5.981 0 006.75 15.75v-1.5"/>
      </svg>
      Classes
    </a>

    <a href="{% url 'parent_attendance' %}"
       class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition
              {% if 'attendance' in request.path %}
                bg-indigo-500/20 text-white border border-indigo-400/20
              {% else %}
                text-slate-300 hover:bg-white/8 hover:text-white
              {% endif %}">
      <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      Attendance
    </a>

    <a href="{% url 'parent_progress' %}"
       class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition
              {% if 'progress' in request.path %}
                bg-indigo-500/20 text-white border border-indigo-400/20
              {% else %}
                text-slate-300 hover:bg-white/8 hover:text-white
              {% endif %}">
      <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/>
      </svg>
      Progress
    </a>

    <!-- Section divider -->
    <div class="pt-3 pb-1">
      <p class="px-4 text-[10px] font-semibold uppercase tracking-wider text-slate-500">Billing</p>
    </div>

    <a href="{% url 'parent_invoices' %}"
       class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition
              {% if 'invoices' in request.path %}
                bg-indigo-500/20 text-white border border-indigo-400/20
              {% else %}
                text-slate-300 hover:bg-white/8 hover:text-white
              {% endif %}">
      <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
      </svg>
      Invoices
    </a>

    <a href="{% url 'parent_payment_history' %}"
       class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition
              {% if 'payments' in request.path %}
                bg-indigo-500/20 text-white border border-indigo-400/20
              {% else %}
                text-slate-300 hover:bg-white/8 hover:text-white
              {% endif %}">
      <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5z"/>
      </svg>
      Payments
    </a>

    <a href="{% url 'parent_billing' %}"
       class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition
              {% if 'billing' in request.path %}
                bg-indigo-500/20 text-white border border-indigo-400/20
              {% else %}
                text-slate-300 hover:bg-white/8 hover:text-white
              {% endif %}">
      <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z"/>
      </svg>
      Billing
    </a>

  </nav>

  <!-- Divider -->
  <div class="mx-3 my-4 border-t border-white/10"></div>

  <!-- Profile & logout -->
  <div class="px-3 space-y-0.5">
    <a href="{% url 'profile' %}"
       class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-slate-300 hover:bg-white/8 hover:text-white transition">
      <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
      </svg>
      Profile
    </a>
  </div>

</div>
