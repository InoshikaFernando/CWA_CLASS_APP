{% extends "base.html" %}
{% block title %}Student Report{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto">

  <!-- Header -->
  <div class="mb-6 flex items-start justify-between gap-4">
    <div>
      <h1 class="text-2xl font-display font-bold text-gray-900">Student Report</h1>
      <p class="text-gray-500 mt-1">Filter and view students across your school</p>
    </div>
    <a href="?{% for key, val in request.GET.items %}{% if key != 'page' and key != 'export' %}{{ key }}={{ val }}&amp;{% endif %}{% endfor %}export=csv"
       class="inline-flex items-center gap-2 px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm font-medium hover:bg-emerald-700 transition shrink-0">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/>
      </svg>
      Export CSV
    </a>
  </div>

  <!-- Filter bar -->
  <form method="get"
        hx-get="{% url 'reports_students' %}"
        hx-target="#report-table-container"
        hx-swap="innerHTML"
        hx-push-url="true"
        hx-trigger="change from:select, change from:input[type=checkbox]"
        class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 mb-6">

    <div class="flex flex-wrap gap-4 items-end">

      <!-- Class filter -->
      <div class="flex flex-col gap-1 min-w-[180px]">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Class</label>
        <select name="class_id"
                class="rounded-lg border border-slate-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent/40">
          <option value="">All classes</option>
          {% for cls in available_classes %}
            <option value="{{ cls.id }}" {% if filters.class_id == cls.id %}selected{% endif %}>{{ cls.name }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Enrollment status -->
      <div class="flex flex-col gap-1 min-w-[150px]">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Enrollment</label>
        <select name="status"
                class="rounded-lg border border-slate-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent/40">
          <option value="all" {% if filters.status == 'all' or not filters.status %}selected{% endif %}>All</option>
          <option value="active" {% if filters.status == 'active' %}selected{% endif %}>Active</option>
          <option value="inactive" {% if filters.status == 'inactive' %}selected{% endif %}>Inactive</option>
        </select>
      </div>

      <!-- Payment status -->
      <div class="flex flex-col gap-1 min-w-[150px]">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Payment</label>
        <select name="payment"
                class="rounded-lg border border-slate-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent/40">
          <option value="all" {% if filters.payment == 'all' or not filters.payment %}selected{% endif %}>All</option>
          <option value="ok" {% if filters.payment == 'ok' %}selected{% endif %}>OK</option>
          <option value="blocked" {% if filters.payment == 'blocked' %}selected{% endif %}>Payment blocked</option>
        </select>
      </div>

      <!-- Not in class -->
      <div class="flex items-center gap-2 pb-2">
        <input type="checkbox" id="no_class" name="no_class" value="1"
               {% if filters.no_class %}checked{% endif %}
               class="rounded border-slate-300 text-accent focus:ring-accent/40">
        <label for="no_class" class="text-sm font-medium text-gray-700">Not in any class</label>
      </div>

      <!-- Submit (for no-JS fallback) + reset -->
      <div class="flex gap-2 pb-2 ml-auto">
        <button type="submit"
                class="px-4 py-2 bg-accent text-white rounded-lg text-sm font-medium hover:bg-accent/90 transition">
          Apply
        </button>
        <a href="{% url 'reports_students' %}"
           class="px-4 py-2 bg-slate-100 text-gray-700 rounded-lg text-sm font-medium hover:bg-slate-200 transition">
          Reset
        </a>
      </div>

    </div>
  </form>

  <!-- Results table -->
  <div id="report-table-container">
    {% include "reports/_partials/student_report_table.html" %}
  </div>

</div>
{% endblock %}
