{% extends "base.html" %}
{% block title %}Expense Report{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-display font-bold text-gray-900">Expense Report</h1>
      <p class="text-gray-500 mt-1">Track and filter school expenses</p>
    </div>
    {% if can_manage %}
    <a href="{% url 'expense_add' %}"
       class="inline-flex items-center gap-2 px-4 py-2.5 bg-accent text-white rounded-xl text-sm font-semibold hover:bg-accent/90 transition shadow-sm">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
      </svg>
      Add Expense
    </a>
    {% endif %}
  </div>

  <!-- Filter bar -->
  <form method="get"
        hx-get="{% url 'reports_expenses' %}"
        hx-target="#report-table-container"
        hx-swap="innerHTML"
        hx-push-url="true"
        hx-trigger="change from:select, change from:input[type=date]"
        class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 mb-6">

    <div class="flex flex-wrap gap-4 items-end">

      <!-- Category filter -->
      <div class="flex flex-col gap-1 min-w-[180px]">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Category</label>
        <select name="category"
                class="rounded-lg border border-slate-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent/40">
          <option value="all" {% if filters.category == 'all' or not filters.category %}selected{% endif %}>All categories</option>
          {% for value, label in category_choices %}
            <option value="{{ value }}" {% if filters.category == value %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Department filter -->
      <div class="flex flex-col gap-1 min-w-[180px]">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Department</label>
        <select name="department_id"
                class="rounded-lg border border-slate-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent/40">
          <option value="">All departments</option>
          {% for dept in available_departments %}
            <option value="{{ dept.id }}" {% if filters.department_id == dept.id %}selected{% endif %}>{{ dept.name }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Date from -->
      <div class="flex flex-col gap-1 min-w-[160px]">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">From</label>
        <input type="date" name="date_from" value="{{ filters.date_from|date:'Y-m-d' }}"
               class="rounded-lg border border-slate-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent/40">
      </div>

      <!-- Date to -->
      <div class="flex flex-col gap-1 min-w-[160px]">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">To</label>
        <input type="date" name="date_to" value="{{ filters.date_to|date:'Y-m-d' }}"
               class="rounded-lg border border-slate-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent/40">
      </div>

      <!-- Submit + reset -->
      <div class="flex gap-2 pb-0.5 ml-auto">
        <button type="submit"
                class="px-4 py-2 bg-accent text-white rounded-lg text-sm font-medium hover:bg-accent/90 transition">
          Apply
        </button>
        <a href="{% url 'reports_expenses' %}"
           class="px-4 py-2 bg-slate-100 text-gray-700 rounded-lg text-sm font-medium hover:bg-slate-200 transition">
          Reset
        </a>
      </div>

    </div>
  </form>

  <!-- Results table -->
  <div id="report-table-container">
    {% include "reports/_partials/expense_report_table.html" %}
  </div>

</div>
{% endblock %}
