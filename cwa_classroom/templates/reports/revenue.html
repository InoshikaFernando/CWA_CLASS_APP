{% extends "base.html" %}
{% block title %}Revenue Report{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto">

  <!-- Header -->
  <div class="mb-6">
    <h1 class="text-2xl font-display font-bold text-gray-900">Revenue Report</h1>
    <p class="text-gray-500 mt-1">Filter and view invoices and payments across your school</p>
  </div>

  <!-- Filter bar -->
  <form method="get"
        hx-get="{% url 'reports_revenue' %}"
        hx-target="#report-table-container"
        hx-swap="innerHTML"
        hx-push-url="true"
        hx-trigger="change from:select, change from:input[type=date]"
        class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 mb-6">

    <div class="flex flex-wrap gap-4 items-end">

      <!-- Date from -->
      <div class="flex flex-col gap-1 min-w-[160px]">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">From</label>
        <input type="date" name="date_from" value="{{ filters.date_from|date:'Y-m-d'|default:'' }}"
               class="rounded-lg border border-slate-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent/40">
      </div>

      <!-- Date to -->
      <div class="flex flex-col gap-1 min-w-[160px]">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">To</label>
        <input type="date" name="date_to" value="{{ filters.date_to|date:'Y-m-d'|default:'' }}"
               class="rounded-lg border border-slate-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent/40">
      </div>

      <!-- Student filter -->
      <div class="flex flex-col gap-1 min-w-[180px]">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Student</label>
        <select name="student_id"
                class="rounded-lg border border-slate-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent/40">
          <option value="">All students</option>
          {% for ss in available_students %}
            <option value="{{ ss.student_id }}" {% if filters.student_id == ss.student_id %}selected{% endif %}>{{ ss.student.get_full_name|default:ss.student.username }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Class filter -->
      <div class="flex flex-col gap-1 min-w-[180px]">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Class</label>
        <select name="class_id"
                class="rounded-lg border border-slate-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent/40">
          <option value="">All classes</option>
          {% for cls in available_classes %}
            <option value="{{ cls.id }}" {% if filters.class_id == cls.id %}selected{% endif %}>{{ cls.name }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Payment method filter -->
      <div class="flex flex-col gap-1 min-w-[160px]">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Payment Method</label>
        <select name="payment_method"
                class="rounded-lg border border-slate-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent/40">
          <option value="all" {% if filters.payment_method == 'all' or not filters.payment_method %}selected{% endif %}>All methods</option>
          <option value="bank_transfer" {% if filters.payment_method == 'bank_transfer' %}selected{% endif %}>Bank Transfer</option>
          <option value="cash" {% if filters.payment_method == 'cash' %}selected{% endif %}>Cash</option>
          <option value="cheque" {% if filters.payment_method == 'cheque' %}selected{% endif %}>Cheque</option>
          <option value="stripe" {% if filters.payment_method == 'stripe' %}selected{% endif %}>Stripe</option>
          <option value="other" {% if filters.payment_method == 'other' %}selected{% endif %}>Other</option>
        </select>
      </div>

      <!-- Status filter -->
      <div class="flex flex-col gap-1 min-w-[130px]">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Status</label>
        <select name="status"
                class="rounded-lg border border-slate-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent/40">
          <option value="all" {% if filters.status == 'all' or not filters.status %}selected{% endif %}>All</option>
          <option value="draft" {% if filters.status == 'draft' %}selected{% endif %}>Draft</option>
          <option value="issued" {% if filters.status == 'issued' %}selected{% endif %}>Issued</option>
          <option value="partially_paid" {% if filters.status == 'partially_paid' %}selected{% endif %}>Partially Paid</option>
          <option value="paid" {% if filters.status == 'paid' %}selected{% endif %}>Paid</option>
          <option value="cancelled" {% if filters.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
        </select>
      </div>

      <!-- Submit + reset -->
      <div class="flex gap-2 pb-2 ml-auto">
        <button type="submit"
                class="px-4 py-2 bg-accent text-white rounded-lg text-sm font-medium hover:bg-accent/90 transition">
          Apply
        </button>
        <a href="{% url 'reports_revenue' %}"
           class="px-4 py-2 bg-slate-100 text-gray-700 rounded-lg text-sm font-medium hover:bg-slate-200 transition">
          Reset
        </a>
      </div>

    </div>
  </form>

  <!-- Results table -->
  <div id="report-table-container">
    {% include "reports/_partials/revenue_report_table.html" %}
  </div>

</div>
{% endblock %}
