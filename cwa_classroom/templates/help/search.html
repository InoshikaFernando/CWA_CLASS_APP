{% extends "base.html" %}

{% block title %}Search Help{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">

  <nav class="flex items-center gap-2 text-sm text-gray-500 mb-6">
    <a href="{% url 'help:help_centre' %}" class="hover:text-accent">Help Centre</a>
    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
    </svg>
    <span class="text-gray-800 font-medium">Search</span>
  </nav>

  <h1 class="text-2xl font-bold text-gray-900 mb-6">Search Help Articles</h1>

  <div class="relative mb-6">
    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 15.803 7.5 7.5 0 0016.803 15.803z"/>
    </svg>
    <input type="text"
           name="q"
           value="{{ query }}"
           placeholder="Search help articles…"
           autocomplete="off"
           autofocus
           hx-get="{% url 'help:help_search' %}"
           hx-target="#search-results"
           hx-trigger="keyup changed delay:400ms"
           hx-indicator="#search-spinner"
           class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-accent/40 bg-white shadow-sm">
    <svg id="search-spinner" class="htmx-indicator absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 animate-spin text-accent" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
    </svg>
  </div>

  <div id="search-results">
    {% include "help/partials/search_results.html" %}
  </div>

</div>
{% endblock %}
