{% if request.resolver_match %}
<div x-data="{ open: false }"
     @keydown.escape.window="open = false">

  <!-- Floating ? button -->
  <button @click="open = !open"
          class="fixed bottom-20 right-4 md:bottom-6 md:right-6 z-40
                 w-11 h-11 rounded-full bg-accent text-white shadow-lg
                 flex items-center justify-center
                 hover:bg-accent-dark transition focus:outline-none focus:ring-2 focus:ring-accent/50"
          title="Help"
          aria-label="Open help">
    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z"/>
    </svg>
  </button>

  <!-- Backdrop -->
  <div x-show="open"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       x-cloak
       @click="open = false"
       class="fixed inset-0 bg-black/20 z-40"></div>

  <!-- Drawer panel -->
  <div x-show="open"
       x-transition:enter="transition ease-out duration-250"
       x-transition:enter-start="translate-x-full opacity-0"
       x-transition:enter-end="translate-x-0 opacity-100"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="translate-x-0 opacity-100"
       x-transition:leave-end="translate-x-full opacity-0"
       x-cloak
       class="fixed top-0 right-0 bottom-0 z-50 w-80 md:w-96 bg-white shadow-2xl flex flex-col">

    <!-- Drawer header -->
    <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
      <div class="flex items-center gap-2">
        <svg class="w-5 h-5 text-accent" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z"/>
        </svg>
        <span class="font-semibold text-gray-900 text-sm">Help</span>
      </div>
      <div class="flex items-center gap-3">
        <a href="{% url 'help:help_centre' %}" class="text-xs text-accent hover:underline">View all</a>
        <button @click="open = false" class="text-gray-400 hover:text-gray-600 transition" aria-label="Close help">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Search -->
    <div class="px-4 py-3 border-b border-gray-100">
      <div class="relative">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 15.803 7.5 7.5 0 0016.803 15.803z"/>
        </svg>
        <input type="text"
               name="help_q"
               placeholder="Search help…"
               autocomplete="off"
               hx-get="{% url 'help:help_search' %}"
               hx-target="#help-drawer-results"
               hx-trigger="keyup changed delay:350ms"
               hx-indicator="#drawer-spinner"
               class="w-full pl-9 pr-8 py-2 border border-gray-200 rounded-lg text-sm
                      focus:outline-none focus:ring-2 focus:ring-accent/40 bg-gray-50">
        <svg id="drawer-spinner" class="htmx-indicator absolute right-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 animate-spin text-accent" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
      </div>
    </div>

    <!-- Contextual content -->
    <div class="flex-1 overflow-y-auto px-4 py-4">
      <div id="help-drawer-results"
           hx-get="{% url 'help:help_context' %}?url_name={{ request.resolver_match.url_name }}&module={{ help_module }}"
           hx-trigger="intersect once"
           hx-swap="innerHTML">
        <div class="flex items-center justify-center py-8">
          <svg class="w-5 h-5 animate-spin text-gray-300" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
        </div>
      </div>
    </div>

    <!-- Drawer footer -->
    <div class="px-4 py-3 border-t border-gray-100 bg-gray-50">
      <a href="{% url 'help:help_faq' %}"
         class="flex items-center justify-center gap-2 w-full py-2 text-sm text-gray-600 hover:text-accent transition">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z"/>
        </svg>
        Browse FAQ
      </a>
    </div>

  </div>
</div>
{% endif %}
