{% extends "base_public.html" %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<section class="py-20 bg-gradient-to-br from-blue-50 to-slate-50 min-h-[60vh] flex items-center">
  <div class="max-w-2xl mx-auto px-4 text-center">
    <div class="mb-8">
      <span class="font-display text-8xl text-primary/30">404</span>
    </div>
    <h1 class="font-display text-3xl text-gray-800 mb-4">Page not found</h1>
    <p class="text-gray-500 mb-8">
      Sorry, the page you're looking for doesn't exist or has been moved.
    </p>
    <a href="/"
       class="inline-block bg-primary text-white hover:bg-primary-dark rounded-xl px-6 py-3 font-semibold transition">
      Back to Home
    </a>
  </div>
</section>
{% endblock %}
