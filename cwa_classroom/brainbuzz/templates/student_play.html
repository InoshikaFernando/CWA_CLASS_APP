<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainBuzz - Play</title>
    <script defer src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .pulse-tile {
            animation: pulse 0.4s ease-in-out;
        }
        @keyframes scorePopIn {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .score-pop {
            animation: scorePopIn 0.6s ease-out;
        }
        .tile-triangle::before {
            content: '▲';
            font-size: 3rem;
        }
        .tile-diamond::before {
            content: '◆';
            font-size: 3rem;
        }
        .tile-circle::before {
            content: '●';
            font-size: 3rem;
        }
        .tile-square::before {
            content: '■';
            font-size: 3rem;
        }
        /* Circular countdown SVG */
        .countdown-circle {
            transform: rotate(-90deg);
        }
        .countdown-circle-progress {
            transition: stroke-dashoffset 0.1s linear;
            stroke-dasharray: 282.7; /* 2πr where r=45 */
        }
    </style>
</head>
<body class="bg-slate-50">
    <div x-data="bbStudent()" x-init="init('{{ session.code }}')" class="min-h-screen flex flex-col">
        
        <!-- Network Error Banner -->
        <div x-show="networkError" class="bg-red-100 border-b border-red-300 px-4 py-3 text-red-700 text-sm">
            <span>⚠️ Network error. Retrying...</span>
        </div>

        <!-- Header: Progress & Join Code -->
        <div class="bg-white border-b border-slate-200 px-4 py-3 flex justify-between items-center">
            <div class="text-xs font-semibold text-slate-500 uppercase">
                Q <span x-text="currentIndex + 1"></span> of <span x-text="totalQuestions"></span>
            </div>
            <div class="text-lg font-mono font-bold text-slate-900" x-text="joinCode"></div>
        </div>

        <!-- ====================================================================
             LOBBY: Waiting for host to start
             ==================================================================== -->
        <template x-if="gameStatus === 'lobby'">
            <div class="flex-1 flex flex-col items-center justify-center px-4 py-8 gap-6">
                <div class="text-5xl animate-bounce">🎮</div>
                <p class="text-lg font-medium text-slate-700 text-center">Waiting for host to start…</p>
                <p class="text-sm text-slate-500">
                    <span x-text="participantCount"></span> players joined
                </p>
            </div>
        </template>

        <!-- ====================================================================
             ACTIVE: Show current question with tile/text options
             ==================================================================== -->
        <template x-if="gameStatus === 'active' && question">
            <div class="flex-1 flex flex-col px-4 py-6 gap-6">
                
                <!-- Question Text (Compact) -->
                <div class="bg-white rounded-lg p-4 shadow-sm">
                    <p class="text-base font-semibold text-slate-900" x-text="question.question_text"></p>
                </div>

                <!-- Countdown Timer Pill -->
                <div class="flex justify-center">
                    <div class="relative w-24 h-24">
                        <svg class="countdown-circle w-full h-full" viewBox="0 0 100 100">
                            <!-- Background circle -->
                            <circle cx="50" cy="50" r="45" fill="none" stroke="#e2e8f0" stroke-width="8"/>
                            <!-- Progress circle (red when <5s) -->
                            <circle 
                                class="countdown-circle-progress"
                                cx="50" cy="50" r="45" 
                                fill="none"
                                :stroke="countdown <= 5 ? '#ef4444' : '#3b82f6'"
                                stroke-width="8"
                                :style="`stroke-dashoffset: ${282.7 * (1 - countdown / timePerQuestion)}`"
                            />
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span class="text-xl font-bold" :class="countdown <= 5 ? 'text-red-600' : 'text-blue-600'"
                                x-text="`${Math.max(0, countdown)}s`"></span>
                        </div>
                    </div>
                </div>

                <!-- MCQ/TF: Four Tap Targets (2×2 grid) -->
                <template x-if="question.question_type === 'mcq' || question.question_type === 'tf'">
                    <div class="grid grid-cols-2 gap-3 flex-1">
                        <template x-for="(opt, idx) in question.options" :key="idx">
                            <button
                                @click="submitAnswer({ option_label: opt.label })"
                                :disabled="submitting || countdown <= 0 || alreadyAnswered"
                                :class="{
                                    'pulse-tile': justAnswered && selectedAnswer.option_label === opt.label,
                                    'opacity-50 cursor-not-allowed': submitting || countdown <= 0 || alreadyAnswered,
                                    'hover:scale-105': !submitting && !alreadyAnswered,
                                }"
                                class="
                                    min-h-[120px] rounded-lg font-bold text-lg
                                    flex flex-col items-center justify-center gap-2
                                    transition-all transform active:scale-95
                                    disabled:cursor-not-allowed
                                "
                                :style="{
                                    backgroundColor: {
                                        'A': '#ef4444',  // red
                                        'B': '#3b82f6',  // blue
                                        'C': '#eab308',  // yellow
                                        'D': '#10b981'   // green
                                    }[opt.label],
                                    color: 'white',
                                }"
                                aria-label="Option"
                            >
                                <!-- Shape based on label -->
                                <div class="text-3xl">
                                    <span x-show="opt.label === 'A'">▲</span>
                                    <span x-show="opt.label === 'B'">◆</span>
                                    <span x-show="opt.label === 'C'">●</span>
                                    <span x-show="opt.label === 'D'">■</span>
                                </div>
                                <span class="text-sm font-semibold tracking-widest" x-text="opt.label"></span>
                            </button>
                        </template>
                    </div>
                </template>

                <!-- Short Answer / Fill Blank: Text Input -->
                <template x-if="question.question_type === 'short_answer' || question.question_type === 'fill_blank' || question.question_type === 'short' || question.question_type === 'fill'">
                    <div class="flex-1 flex flex-col gap-3">
                        <input 
                            type="text"
                            x-model="textAnswer"
                            placeholder="Your answer..."
                            @keydown.enter="submitAnswer({ text: textAnswer })"
                            :disabled="submitting || countdown <= 0 || alreadyAnswered"
                            maxlength="200"
                            class="
                                w-full px-4 py-3 rounded-lg border border-slate-300
                                focus:border-blue-500 focus:ring-2 focus:ring-blue-100
                                disabled:opacity-50 disabled:cursor-not-allowed
                            "
                        />
                        <button
                            @click="submitAnswer({ text: textAnswer })"
                            :disabled="submitting || countdown <= 0 || !textAnswer.trim() || alreadyAnswered"
                            class="
                                w-full px-4 py-3 bg-blue-600 text-white font-semibold rounded-lg
                                hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed
                                transition-colors
                            "
                        >
                            <span x-show="!submitting">Submit Answer</span>
                            <span x-show="submitting">Submitting...</span>
                        </button>
                    </div>
                </template>

                <!-- Lock-In Feedback -->
                <template x-if="justAnswered">
                    <div class="bg-white rounded-lg p-4 border-l-4" :class="isCorrect ? 'border-green-500' : 'border-red-500'">
                        <div class="flex items-center gap-3">
                            <span class="text-2xl" x-show="isCorrect">✅</span>
                            <span class="text-2xl" x-show="!isCorrect">❌</span>
                            <div class="flex-1">
                                <p class="font-semibold text-slate-900" x-show="isCorrect">Correct!</p>
                                <p class="font-semibold text-slate-900" x-show="!isCorrect">Incorrect</p>
                                <p class="text-sm text-slate-600">
                                    <span x-show="isCorrect" class="score-pop" x-text="`+${pointsAwarded} pts`"></span>
                                    <span x-show="!isCorrect">0 pts</span>
                                </p>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- Accessibility: Live region for screen readers -->
                <div 
                    aria-live="polite" 
                    aria-atomic="true"
                    class="sr-only"
                    x-text="`Question ${currentIndex + 1} of ${totalQuestions}. ${question.question_text}. ${countdown} seconds remaining.`"
                ></div>

            </div>
        </template>

        <!-- ====================================================================
             REVEAL: Show answer distribution, correct answer, rank
             ==================================================================== -->
        <template x-if="gameStatus === 'reveal' && question">
            <div class="flex-1 flex flex-col px-4 py-6 gap-6">
                
                <!-- Answer Distribution -->
                <div class="bg-white rounded-lg p-4 shadow-sm">
                    <p class="text-sm font-semibold text-slate-500 mb-3 uppercase">Answer Distribution</p>
                    <div class="grid grid-cols-2 gap-2">
                        <template x-for="(opt, idx) in question.options" :key="idx">
                            <div class="text-center">
                                <div class="text-2xl mb-1" x-text="{
                                    'A': '▲',
                                    'B': '◆',
                                    'C': '●',
                                    'D': '■'
                                }[opt.label]"></div>
                                <p class="font-bold text-lg" x-text="`${answerCounts[opt.label] || 0}`"></p>
                                <p class="text-xs text-slate-500" x-text="opt.label"></p>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Correct Answer Highlight -->
                <div class="bg-green-50 border border-green-300 rounded-lg p-4">
                    <p class="text-sm font-semibold text-green-700 mb-2">✓ Correct Answer</p>
                    <p class="font-bold text-slate-900" x-show="selectedAnswer"
                        :class="isCorrect ? 'text-green-600' : 'text-red-600'"
                    >
                        <span x-show="isCorrect">You answered correctly!</span>
                        <span x-show="!isCorrect">Correct answer was: <span x-text="correctLabel"></span></span>
                    </p>
                </div>

                <!-- Your Rank -->
                <div class="bg-blue-50 border border-blue-300 rounded-lg p-4 text-center">
                    <p class="text-sm font-semibold text-blue-700 mb-1">Your Rank</p>
                    <p class="text-4xl font-bold text-blue-900" x-text="`#${currentRank}`"></p>
                </div>

                <!-- Auto-Advance Countdown -->
                <p class="text-center text-sm text-slate-500">
                    Auto-advancing in <span x-text="autoAdvanceCountdown"></span>s...
                </p>

                <!-- Accessibility: Live region -->
                <div aria-live="polite" class="sr-only"
                    x-text="`${isCorrect ? 'Correct' : 'Incorrect'}. You are ranked ${currentRank}. Auto-advancing in ${autoAdvanceCountdown} seconds.`"
                ></div>

            </div>
        </template>

        <!-- ====================================================================
             FINISHED: Show final results and leaderboard link
             ==================================================================== -->
        <template x-if="gameStatus === 'finished'">
            <div class="flex-1 flex flex-col items-center justify-center px-4 py-8 gap-6 text-center">
                <div class="text-5xl">🏁</div>
                <h2 class="text-2xl font-bold text-slate-900">Game Over!</h2>
                
                <!-- Final Rank -->
                <div class="bg-gradient-to-b from-yellow-100 to-yellow-50 rounded-lg p-6 w-full max-w-xs border border-yellow-300">
                    <p class="text-sm font-semibold text-yellow-700 mb-2">Final Rank</p>
                    <p class="text-5xl font-bold text-yellow-900" x-text="`#${finalRank}`"></p>
                    <p class="text-sm text-yellow-700 mt-2">of <span x-text="totalParticipants"></span> players</p>
                </div>

                <!-- Score Summary -->
                <div class="bg-white rounded-lg p-4 w-full border border-slate-200">
                    <div class="grid grid-cols-3 gap-4">
                        <div class="text-center">
                            <p class="text-2xl font-bold text-slate-900" x-text="totalScore"></p>
                            <p class="text-xs text-slate-600">Points</p>
                        </div>
                        <div class="text-center border-l border-r border-slate-200">
                            <p class="text-2xl font-bold text-green-600" x-text="correctCount"></p>
                            <p class="text-xs text-slate-600">Correct</p>
                        </div>
                        <div class="text-center">
                            <p class="text-2xl font-bold text-red-600" x-text="incorrectCount"></p>
                            <p class="text-xs text-slate-600">Incorrect</p>
                        </div>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="flex gap-3 w-full max-w-xs">
                    <a href="/brainbuzz/join/" class="flex-1 px-4 py-2 bg-slate-200 text-slate-900 font-semibold rounded-lg hover:bg-slate-300">
                        Join New Game
                    </a>
                </div>

                <!-- Accessibility: Live region -->
                <div aria-live="polite" class="sr-only"
                    x-text="`Game over. Final rank: ${finalRank} of ${totalParticipants}. Total score: ${totalScore}. Correct: ${correctCount}. Incorrect: ${incorrectCount}.`"
                ></div>

            </div>
        </template>

    </div>

    <script>
        function bbStudent() {
            return {
                // State
                gameStatus: 'lobby',
                stateVersion: -1,
                joinCode: '',
                currentIndex: 0,
                totalQuestions: 0,
                participantCount: 0,
                question: null,
                selectedAnswer: null,
                textAnswer: '',
                submitting: false,
                justAnswered: false,
                isCorrect: false,
                pointsAwarded: 0,
                countdown: 0,
                timePerQuestion: 20,
                autoAdvanceCountdown: 3,
                answerCounts: {},
                currentRank: 0,
                finalRank: 0,
                totalParticipants: 0,
                totalScore: 0,
                correctCount: 0,
                incorrectCount: 0,
                alreadyAnswered: false,
                networkError: false,
                retryCount: 0,

                // Lifecycle
                async init(code) {
                    this.joinCode = code;
                    await this.pollState();
                    // Start countdown timer
                    setInterval(() => this.updateCountdown(), 100);
                    // Start polling
                    setInterval(() => this.pollState(), 1500);
                },

                // Polling
                async pollState() {
                    try {
                        const resp = await fetch(`/brainbuzz/api/session/${this.joinCode}/state/?since=${this.stateVersion}`);
                        if (resp.status === 304) return;  // No change
                        
                        const data = await resp.json();
                        this.applyState(data);
                        this.networkError = false;
                        this.retryCount = 0;
                    } catch (err) {
                        this.networkError = true;
                        this.retryCount++;
                        if (this.retryCount > 3) {
                            console.error('Failed to poll state after 3 retries', err);
                        }
                    }
                },

                applyState(data) {
                    const prevStatus = this.gameStatus;
                    const prevIndex = this.currentIndex;

                    const statusMap = {
                        'lobby': 'lobby',
                        'active': 'active',
                        'reveal': 'reveal',
                        'between': 'reveal',
                        'finished': 'finished',
                    };
                    this.gameStatus = statusMap[data.status] || 'lobby';
                    this.stateVersion = data.state_version || 0;
                    this.currentIndex = data.current_index;
                    this.totalQuestions = data.total_questions || 0;
                    this.participantCount = data.participant_count || 0;
                    this.timePerQuestion = data.time_per_question_sec || this.timePerQuestion;

                    // Reset per-question state when question changes
                    if (data.current_index !== prevIndex) {
                        this.alreadyAnswered = false;
                        this.justAnswered = false;
                        this.selectedAnswer = null;
                        this.textAnswer = '';
                        this.isCorrect = false;
                        this.pointsAwarded = 0;
                        localStorage.setItem('bb_question_started_at', Date.now());
                    }

                    if (data.question) {
                        this.question = data.question;
                        // Set question start time on first question
                        if (!localStorage.getItem('bb_question_started_at')) {
                            localStorage.setItem('bb_question_started_at', Date.now());
                        }
                    }

                    // Fix: answer_distribution is a list [{label, text, count, is_correct}]
                    if (Array.isArray(data.answer_distribution)) {
                        this.answerCounts = {};
                        for (const opt of data.answer_distribution) {
                            this.answerCounts[opt.label] = opt.count;
                        }
                    }

                    // Auto-advance from reveal to next/finished
                    if (prevStatus === 'active' && this.gameStatus === 'reveal') {
                        this.startAutoAdvance();
                    }
                },

                updateCountdown() {
                    if (this.gameStatus !== 'active' || !this.question) return;
                    
                    const now = new Date().getTime();
                    const deadline = new Date(this.question.question_deadline).getTime();
                    const remaining = Math.max(0, Math.ceil((deadline - now) / 1000));
                    
                    this.countdown = remaining;
                    
                    // Trigger late-answer lock if deadline passes
                    if (remaining <= 0 && !this.alreadyAnswered && !this.justAnswered) {
                        this.alreadyAnswered = true;
                    }
                },

                // Answer Submission with Offline Retry
                async submitAnswer(payload) {
                    if (this.alreadyAnswered) return;
                    
                    this.submitting = true;
                    
                    const fullPayload = {
                        participant_id: this.getParticipantId(),
                        question_index: this.currentIndex,
                        answer_payload: payload,
                        time_taken_ms: this.getTimeTaken(),
                    };
                    
                    let success = false;
                    for (let attempt = 0; attempt < 3; attempt++) {
                        try {
                            const resp = await fetch(`/brainbuzz/api/session/${this.joinCode}/submit/`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(fullPayload),
                            });
                            
                            if (resp.ok) {
                                const data = await resp.json();
                                this.selectedAnswer = payload;
                                this.isCorrect = data.is_correct;
                                this.pointsAwarded = data.score_awarded;
                                this.justAnswered = true;
                                this.alreadyAnswered = true;
                                success = true;
                                
                                // Haptic feedback
                                this.triggerHaptic(data.is_correct);
                                
                                // Show feedback briefly
                                setTimeout(() => { this.justAnswered = false; }, 2000);
                                break;
                            } else if (resp.status === 409) {
                                // Already answered
                                this.alreadyAnswered = true;
                                break;
                            }
                        } catch (err) {
                            const backoff = 1000 * Math.pow(1.5, attempt);
                            await new Promise(r => setTimeout(r, backoff));
                        }
                    }
                    
                    this.submitting = false;
                    
                    if (!success) {
                        this.networkError = true;
                        setTimeout(() => { this.networkError = false; }, 3000);
                    }
                },

                triggerHaptic(isCorrect) {
                    if (!navigator.vibrate) return;
                    
                    if (isCorrect) {
                        // Success: 200ms vibration
                        navigator.vibrate(200);
                    } else {
                        // Failure: 3× quick pulses
                        navigator.vibrate([50, 100, 50, 100, 50]);
                    }
                },

                startAutoAdvance() {
                    this.autoAdvanceCountdown = 3;
                    const interval = setInterval(() => {
                        this.autoAdvanceCountdown--;
                        if (this.autoAdvanceCountdown <= 0) {
                            clearInterval(interval);
                            this.pollState();  // This will update to next question
                        }
                    }, 1000);
                },

                getParticipantId() {
                    // From localStorage or session
                    return localStorage.getItem('bb_participant_id') || '0';
                },

                getTimeTaken() {
                    // Time from question start to now, capped at 60s
                    const stored = localStorage.getItem('bb_question_started_at');
                    if (!stored) return 0;
                    return Math.min(Date.now() - parseInt(stored), 60000);
                },
            };
        }
    </script>

</body>
</html>
