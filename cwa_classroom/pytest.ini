[pytest]
DJANGO_SETTINGS_MODULE = cwa_classroom.settings
pythonpath = .
testpaths = ui_tests classroom/tests maths/tests number_puzzles/tests coding/tests brainbuzz/tests feedback/tests sprints/tests whatsapp/tests
addopts = -n auto
markers =
    sidebar: sidebar navigation tests
    dashboard: dashboard/hub page tests
    quiz: quiz experience tests
    attendance: attendance feature tests
    progress: progress dashboard tests
    csv_import: CSV upload/import tests
    invoice: invoicing feature tests
    parent_approval: parent signup and approval workflow tests
    parent_progress: parent progress view tests
    enrollment: enrollment request and approval workflow tests
    student_edit: student edit modal tests
    parent_page: parent list page tests
    parent_invoice: parent invoice view tests
    search: server-side search tests
    parent_portal: parent portal tests
    live: browser-only tests against a deployed environment (--live-url)
    migration: migration validation tests against a deployed environment (--live-url)
    brainbuzz_images: BrainBuzz question and answer image rendering tests (CPP-250)
    cpp309: Languages app plugin and model tests (CPP-309)
    cpp310: Whiteboard canvas and stroke-data tests (CPP-310)
    cpp311: IoU-based handwriting evaluation tests (CPP-311)
    cpp312: Phonics MCQ exercise tests (CPP-312)
    cpp313: Spelling MCQ and type-the-word exercise tests (CPP-313)
    cpp314: Crossword puzzle exercise tests (CPP-314)
    cpp315: Grammar fill-in-the-blank and sentence ordering tests (CPP-315)
    cpp316: Stage progression tracking and homework/worksheet integration (CPP-316)
    cpp308: Languages plugin bug fixes and UX improvements (CPP-308)
