[pytest]
DJANGO_SETTINGS_MODULE = cwa_classroom.settings
pythonpath = .
testpaths = ui_tests classroom/tests maths/tests number_puzzles/tests coding/tests
addopts = -n auto
markers =
    sidebar: sidebar navigation tests
    dashboard: dashboard/hub page tests
    quiz: quiz experience tests
    attendance: attendance feature tests
    progress: progress dashboard tests
    csv_import: CSV upload/import tests
    invoice: invoicing feature tests
    parent_approval: parent signup and approval workflow tests
    parent_progress: parent progress view tests
    enrollment: enrollment request and approval workflow tests
    student_edit: student edit modal tests
    parent_page: parent list page tests
    parent_invoice: parent invoice view tests
    search: server-side search tests
    parent_portal: parent portal tests
